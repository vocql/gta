<!doctype html>
<html lang="en">
<head>

<title>Dashboard - Visitors | VI</title>
<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Orbitron',sans-serif;
  background:
    linear-gradient(135deg, rgba(255,77,210,0.15), rgba(0,255,224,0.10)),
    url('gta/jason.jpg') center/cover no-repeat fixed;
  background-blend-mode: overlay;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* NAVBAR */
header {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  gap: 12px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.25);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  transition: 0.25s;
}
header:hover {
  box-shadow: 0 12px 40px rgba(255, 77, 210, 0.35);
}
.nav-btn {
  padding: 8px 15px;
  border-radius: 999px;
  color: #fff;
  font-weight: 600;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.18);
  box-shadow: inset 0 1.2px 1.5px rgba(255, 255, 255, 0.4),
              0 4px 18px rgba(0,0,0,0.3);
  transition: 0.25s;
  font-size: 0.9rem;
}
.nav-btn:hover {
  background: rgba(255, 255, 255, 0.14);
  transform: scale(1.05);
}

/* DASHBOARD CONTENT */
main {
  margin-top: 100px;
  width: 90%;
  max-width: 1200px;
  text-align: center;
}

h1 {
  font-size: 2.8rem;
  color: #00ffe0;
  margin-bottom: 1rem;
}

iframe {
  width: 100%;
  height: 80vh;
  border: none;
  border-radius: 16px;
  box-shadow: 0 0 30px rgba(0,255,224,0.4);
  background: rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="nav-btn">Home</a>
  <a href="dashboard.html" class="nav-btn">Dashboard</a>
  <a href="map" class="nav-btn">Map</a>
  <a href="characters" class="nav-btn">Characters</a>
  <a href="places" class="nav-btn">Places</a>
  <a href="screenshots" class="nav-btn">Screenshots</a>
  <a href="trailers" class="nav-btn">Trailers</a>
</header>

<main>
  <h1>Visitor Stats Dashboard</h1>
  <p>(Only you can see this page – real visits from https://vocql.github.io/gta)</p>
  
  <!-- Your Statcounter stats embedded (public guest view) -->
  <iframe src="https://statcounter.com/p13209684/?guest=1" title="Statcounter Dashboard"></iframe>
