<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>

<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
/* Base Reset */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden; background-color: #000;}

body{
  font-family:'Orbitron',sans-serif;
  background: 
    linear-gradient(135deg, rgba(255, 77, 210, 0.2), rgba(0, 255, 224, 0.15)),
    url('gta/jason.jpg') center/cover no-repeat fixed;
  background-blend-mode: overlay;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ================= SIDE MENU ================= */
.side-menu {
  position: fixed;
  left: 0;
  top: 0;
  height: 100%;
  width: 260px;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border-right: 1px solid rgba(255, 255, 255, 0.1);
  display: flex;
  flex-direction: column;
  padding: 40px 20px;
  z-index: 100;
  transform: translateX(-200px); /* Partially hidden */
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.side-menu:hover {
  transform: translateX(0); /* Slides out on hover */
  background: rgba(0, 0, 0, 0.6);
}

.menu-title {
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 40px;
  background: linear-gradient(to right, #ff4dd2, #00ffe0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.nav-btn {
  padding: 15px 20px;
  margin-bottom: 10px;
  border-radius: 12px;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.05);
  transition: 0.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 13px;
}

.nav-btn:hover {
  color: #fff;
  background: rgba(255, 77, 210, 0.2);
  border-color: rgba(255, 77, 210, 0.5);
  transform: translateX(10px);
}

/* ================= COUNTDOWN ================= */
.countdown-wrap{
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 30px;
  padding: 50px 40px;
  text-align: center;
  width: 90%;
  max-width: 700px;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

.title{
    font-size: 42px; 
    font-weight: 900; 
    letter-spacing: 2px;
    margin-bottom: 5px;
}
.subtitle{
    font-size: 14px; 
    margin-bottom: 35px; 
    color: #00ffe0; 
    letter-spacing: 3px;
    opacity: 0.9;
}

.clock{
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}
.unit{
  min-width: 100px;
  padding: 20px 10px;
  border-radius: 15px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.05);
}
.num{
    font-size: 40px; 
    font-weight: 900; 
    color: #fff;
    text-shadow: 0 0 15px rgba(255, 77, 210, 0.5);
}
.label{font-size: 10px; margin-top: 5px; opacity: .6; letter-spacing: 2px;}

/* ================= MUSIC ================= */
.music-trigger{
  position:fixed;
  bottom:25px;
  right:25px; /* Moved to right to avoid menu clash */
  width:50px;
  height:50px;
  background: rgba(255, 77, 210, 0.3);
  border-radius: 50%;
  cursor:pointer;
  z-index:200;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.3s;
}
.music-trigger:hover { transform: rotate(90deg) scale(1.1); background: rgba(255, 77, 210, 0.6); }

.music-wheel{
  position:fixed;
  bottom: 25px;
  right: 90px;
  display:flex;
  gap:10px;
  max-width:calc(100% - 150px);
  overflow-x:auto;
  padding: 10px;
  opacity:0;
  pointer-events:none;
  transform:translateX(20px);
  transition:.3s ease;
}
.music-wheel.active{ opacity:1; pointer-events:auto; transform:translateX(0); }

.music-item{
  padding:10px 20px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  cursor: pointer;
  transition: 0.25s;
}
.music-item:hover{ background: #00ffe0; color: #000; transform: translateY(-3px); }

/* Scrollbar */
.music-wheel::-webkit-scrollbar{ height:4px; }
.music-wheel::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.2); border-radius:10px; }
</style>
</head>

<body>

<nav class="side-menu">
  <div class="menu-title">VI</div>
  <a href="index" class="nav-btn">Home</a>
  <a href="map" class="nav-btn">Map</a>
  <a href="characters" class="nav-btn">Characters</a>
  <a href="places" class="nav-btn">Places</a>
  <a href="screenshots" class="nav-btn">Screenshots</a>
  <a href="trailers" class="nav-btn">Trailers</a>
</nav>

<section class="countdown-wrap">
  <h1 class="title">Grand Theft Auto VI</h1>
  <div class="subtitle">RELEASING NOVEMBER 19, 2026</div>

  <div class="clock">
    <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">HOURS</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINUTES</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECONDS</div></div>
  </div>
</section>

<div class="music-trigger" id="musicTrigger">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
</div>

<div class="music-wheel" id="musicWheel">
  <div class="music-item" data-song="music/together.mp3">Hot Together</div>
  <div class="music-item" data-song="music/long.mp3">Love Is A Long Road</div>
  <div class="music-item" data-song="music/night.mp3">Night</div>
  <div class="music-item" data-song="music/ocean.mp3">Ocean Breeze</div>
  <div class="music-item" data-song="music/self.mp3">Self Control</div>
  <div class="music-item" data-song="music/vice.mp3">Vice City</div>
  </div>

<audio id="musicPlayer"></audio>

<script>
/* ===== COUNTDOWN ===== */
const targetDate = new Date('2026-11-19T00:00:00');
const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

function pad(n){ return String(n).padStart(2,'0'); }

function updateCountdown(){
  const now = new Date();
  const diff = Math.floor((targetDate - now)/1000);
  if(diff<=0) return;

  daysEl.textContent = Math.floor(diff/86400);
  hoursEl.textContent = pad(Math.floor(diff/3600%24));
  minutesEl.textContent = pad(Math.floor(diff/60%60));
  secondsEl.textContent = pad(diff%60);
}

updateCountdown();
setInterval(updateCountdown,1000);

/* ===== MUSIC ===== */
const trigger = document.getElementById('musicTrigger');
const wheel = document.getElementById('musicWheel');
const player = document.getElementById('musicPlayer');

let open = false;
trigger.onclick = () => {
  open = !open;
  wheel.classList.toggle('active', open);
};

document.querySelectorAll('.music-item').forEach(btn=>{
  btn.onclick = () => {
    player.src = btn.dataset.song;
    player.play();
  };
});
</script>

</body>
</html>
