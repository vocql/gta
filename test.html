<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leonida OS | Master Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; color: #fff; }

        body {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('gta/jason.jpg') center/cover no-repeat;
            display: flex; padding: 40px; gap: 30px; justify-content: center;
        }

        /* ====== LEFT WIDGET (STAYS AS REQUESTED) ====== */
        .left-panel {
            width: 340px; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(25px);
            border-radius: 25px; padding: 35px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; flex-shrink: 0; height: 100%;
        }

        /* ====== MIDDLE HUD (THE BIG ONE) ====== */
        .center-hud {
            flex: 1; max-width: 1100px; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(40px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Big HUD Header */
        .hud-header {
            padding: 30px 50px; background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }
        .hud-nav { display: flex; gap: 15px; }
        .hud-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 25px; border-radius: 12px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; color: rgba(255,255,255,0.5); transition: 0.3s;
        }
        .hud-btn:hover, .hud-btn.active { background: #ff4dd2; color: #000; border-color: #ff4dd2; box-shadow: 0 0 20px rgba(255,77,210,0.3); }

        /* Content Display */
        .hud-display { flex: 1; position: relative; overflow-y: auto; background: rgba(0,0,0,0.2); }
        iframe { width: 100%; height: 100%; border: none; }

        /* Internal Page Styling */
        .page-wrap { padding: 50px; }
        .big-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .big-card { 
            background: #111; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            aspect-ratio: 16/10; position: relative; transition: 0.4s;
        }
        .big-card:hover { transform: translateY(-10px); border-color: #00ffe0; }
        .big-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .big-card-info { position: absolute; bottom: 0; padding: 30px; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }

        /* Countdown & Radio Styles */
        .neon-text { font-size: 44px; font-weight: 900; font-style: italic; margin-bottom: 5px; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 30px 0; }
        .t-box { background: rgba(255,255,255,0.05); padding: 15px 5px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .t-val { font-size: 22px; font-weight: 900; display: block; }
        .t-lab { font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        .track-list { height: 350px; overflow-y: auto; }
        .track { padding: 15px 0; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.4); cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .track:hover, .track.active { color: #ff4dd2; padding-left: 10px; }

    </style>
</head>
<body>

<aside class="left-panel">
    <h1 class="neon-text"><span style="color:#ff4dd2; text-shadow: 0 0 15px #ff4dd2;">GTA</span> <span style="color:#00ffe0; text-shadow: 0 0 15px #00ffe0;">VI</span></h1>
    <p style="color:#ff4dd2; font-size: 10px; font-weight: 900; letter-spacing: 2px;">PREPARING FOR NOV 19, 2026</p>

    <div class="timer-grid">
        <div class="t-box"><span class="t-val" id="dd">000</span><span class="t-lab">Days</span></div>
        <div class="t-box"><span class="t-val" id="hh">00</span><span class="t-lab">Hrs</span></div>
        <div class="t-box"><span class="t-val" id="mm">00</span><span class="t-lab">Mins</span></div>
        <div class="t-box"><span class="t-val" id="ss">00</span><span class="t-lab">Secs</span></div>
    </div>

    <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
        <p style="font-size:10px; opacity:0.3; letter-spacing:2px; margin-bottom:15px;">VICE CITY RADIO</p>
        <div class="track-list" id="radioList"></div>
    </div>
</aside>

<main class="center-hud">
    <header class="hud-header">
        <h2 style="font-size: 14px; letter-spacing: 3px; font-weight: 900;">LEONIDA <span style="color:#ff4dd2">DATABASE</span></h2>
        <nav class="hud-nav">
            <div class="hud-btn active" onclick="loadPage('map', this)">Satellite</div>
            <div class="hud-btn" onclick="loadPage('chars', this)">Personnel</div>
            <div class="hud-btn" onclick="loadPage('places', this)">Locations</div>
            <div class="hud-btn" onclick="loadPage('shots', this)">Gallery</div>
            <div class="hud-btn" onclick="loadPage('trailers', this)">Trailers</div>
        </nav>
    </header>

    <div class="hud-display" id="hudDisplay">
        <iframe src="https://map.stateofleonida.net/"></iframe>
    </div>
</main>

<audio id="audioPlayer"></audio>

<script>
/* CONTENT DATA */
const chars = [
    {n:"Lucia", i:"gta/npc/lucia.jpg", d:"Leonida's most wanted ex-con."},
    {n:"Jason", i:"gta/npc/jason.jpg", d:"Former military, now Lucia's partner in crime."},
    {n:"Dre'Quan", i:"gta/npc/dre.jpg", d:"Owner of Only Raw Records."},
    {n:"Boobie Ike", i:"gta/npc/boobie.png", d:"Vice City real estate legend."}
];

const locs = [
    {n:"Vice City", i:"gta/places/vice.jpg", d:"Neon heart of Leonida."},
    {n:"Port Gellhorn", i:"gta/places/port.jpg", d:"Biker-run industrial hub."}
];

/* HUD CONTROLLER */
function loadPage(page, btn) {
    const display = document.getElementById('hudDisplay');
    document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    display.innerHTML = '';

    if(page === 'map') {
        display.innerHTML = `<iframe src="https://map.stateofleonida.net/"></iframe>`;
    } else if(page === 'chars') {
        let h = '<div class="page-wrap"><div class="big-grid">';
        chars.forEach(c => {
            h += `<div class="big-card"><img src="${c.i}"><div class="big-card-info"><h3>${c.n}</h3><p style="font-size:12px; opacity:0.6;">${c.d}</p></div></div>`;
        });
        display.innerHTML = h + '</div></div>';
    } else if(page === 'trailers') {
        display.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/QdBZY2fkU-0?autoplay=1" allowfullscreen></iframe>`;
    }
}

/* RADIO & CLOCK */
const tracks = ["Hot Together", "Love Is A Long Road", "Night", "Ocean Breeze", "Self Control", "Atomic", "Vice City"];
const rl = document.getElementById('radioList');
tracks.forEach(t => {
    const d = document.createElement('div'); d.className='track'; d.innerText=t;
    d.onclick = () => {
        document.querySelectorAll('.track').forEach(i=>i.classList.remove('active')); d.classList.add('active');
        document.getElementById('audioPlayer').src = `music/${t.toLowerCase().replace(/ /g, '')}.mp3`;
        document.getElementById('audioPlayer').play();
    };
    rl.appendChild(d);
});

const target = new Date('2026-11-19T00:00:00');
function update() {
    const diff = Math.floor((target - new Date())/1000);
    document.getElementById('dd').innerText = Math.floor(diff/86400);
    document.getElementById('hh').innerText = Math.floor(diff/3600%24).toString().padStart(2,'0');
    document.getElementById('mm').innerText = Math.floor(diff/60%60).toString().padStart(2,'0');
    document.getElementById('ss').innerText = (diff%60).toString().padStart(2,'0');
}
setInterval(update, 1000); update();
</script>
</body>
</html>
