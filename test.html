<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>
<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Orbitron',sans-serif;
  background:
    linear-gradient(135deg, rgba(255,77,210,0.15), rgba(0,255,224,0.10)),
    url('gta/jason.jpg') center/cover no-repeat fixed;
  background-blend-mode: overlay;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background-position:center 40%;
  min-height:100vh;
  padding:20px;
  position: relative;
}

/* NAVBAR (unchanged) */
header {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  gap: 12px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.25);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
  transition: 0.25s;
}
header:hover {
  box-shadow: 0 12px 40px rgba(255, 77, 210, 0.35);
}
.nav-btn {
  padding: 9px 17px;
  border-radius: 999px;
  color: #fff;
  font-weight: 600;
  text-decoration: none;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.18);
  box-shadow: inset 0 1.2px 1.5px rgba(255, 255, 255, 0.4),
              0 4px 18px rgba(0,0,0,0.3);
  transition: 0.25s;
}
.nav-btn:hover {
  background: rgba(255, 255, 255, 0.14);
  transform: scale(1.05);
}

/* COUNTDOWN (unchanged) */
.countdown-wrap{
  backdrop-filter:blur(1px);
  border-radius:20px;
  padding:26px 34px;
  text-align:center;
  width:88%;
  max-width:600px;
  margin-top:120px;
  background:rgba(0,0,0,0.25);
  border:2px solid #fff;
}
.title{font-size:32px;font-weight:900}
.subtitle{font-size:14px;margin:10px 0 24px}
.clock{
  display:flex;
  gap:12px;
  justify-content:center;
}
.unit{
  min-width:72px;
  padding:12px;
  border-radius:12px;
  background:rgba(0,0,0,0.35);
}
.num{font-size:32px;font-weight:900}
.label{font-size:11px;opacity:.8}

/* PHONE BUTTON & POPUP */
.phone-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, #ff4dd2, #00ffe0);
  border-radius: 50%;
  box-shadow: 0 8px 25px rgba(255, 77, 210, 0.5);
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: bold;
  transition: all 0.3s ease;
  border: 3px solid rgba(255,255,255,0.4);
}
.phone-btn:hover {
  transform: scale(1.15) rotate(10deg);
  box-shadow: 0 15px 40px rgba(255, 77, 210, 0.7);
}
.phone-btn::before { content: "📱"; }

.phone-mockup-container {
  position: fixed;
  bottom: 120px;
  right: 30px;
  width: 320px;
  height: 680px;
  opacity: 0;
  transform: translateX(150%) scale(0.7);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
  z-index: 90;
}
.phone-mockup-container.active {
  opacity: 1;
  transform: translateX(0) scale(1);
  pointer-events: auto;
}
.phone-frame {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 20px 50px rgba(0, 255, 224, 0.6));
}
.phone-screen {
  position: absolute;
  top: 7%;   /* Tuned for this specific PNG's bezels */
  left: 8%;
  width: 84%;
  height: 86%;
  background: #000;
  border-radius: 45px;
  overflow: hidden;
  box-shadow: inset 0 0 40px rgba(255, 77, 210, 0.3);
}
.phone-screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MUSIC (unchanged) */
.music-trigger{
  position:fixed;
  bottom:18px;
  left:18px;
  width:40px;
  height:40px;
  cursor:pointer;
  z-index:200;
}
.music-wheel{
  position:fixed;
  bottom:18px;
  left:70px;
  display:flex;
  gap:8px;
  max-width:calc(100% - 90px);
  overflow-x:auto;
  padding-bottom:4px;
  opacity:0;
  pointer-events:none;
  transform:translateX(-10px);
  transition:.25s ease;
}
.music-wheel.active{
  opacity:1;
  pointer-events:auto;
  transform:translateX(0);
}
.music-item{
  padding:9px 17px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
  white-space:nowrap;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow: inset 0 1.2px 1.5px rgba(255,255,255,0.4), 0 4px 18px rgba(0,0,0,0.3);
  cursor: pointer;
  flex-shrink:0;
  transition: 0.25s ease;
}
.music-item:hover{
  background: rgba(255,255,255,0.14);
  transform: translateY(-1px) scale(1.05);
  box-shadow: inset 0 1.2px 1.5px rgba(255,255,255,0.45), 0 4px 20px rgba(0,0,0,0.35);
}
.music-wheel::-webkit-scrollbar{
  height:6px;
}
.music-wheel::-webkit-scrollbar-track{background:transparent;}
.music-wheel::-webkit-scrollbar-thumb{
  background: rgba(255,255,255,0.3);
  border-radius:3px;
}
</style>
</head>
<body>
<header>
  <a href="index" class="nav-btn">Home</a>
  <a href="map" class="nav-btn">Map</a>
  <a href="characters" class="nav-btn">Characters</a>
  <a href="places" class="nav-btn">Places</a>
  <a href="screenshots" class="nav-btn">Screenshots</a>
  <a href="trailers" class="nav-btn">Trailers</a>
</header>
<section class="countdown-wrap">
  <h1 class="title">Grand Theft Auto VI</h1>
  <div class="subtitle">RELEASE COUNTDOWN – NOVEMBER 19TH, 2026</div>
  <div class="clock">
    <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">HOURS</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINUTES</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECONDS</div></div>
  </div>
</section>

<!-- Floating Phone Button -->
<div class="phone-btn" id="phoneBtn"></div>

<!-- Phone Mockup Popup -->
<div class="phone-mockup-container" id="phoneContainer">
  <img src="https://pngimg.com/uploads/iphone_14/iphone_14_PNG20.png" alt="GTA VI Phone" class="phone-frame">
  <div class="phone-screen">
    <img src="gta/jason.jpg" alt="GTA VI Preview">
  </div>
</div>

<!-- Music Stuff (unchanged) -->
<div class="music-trigger" id="musicTrigger"></div>
<div class="music-wheel" id="musicWheel">
  <div class="music-item" data-song="music/together.mp3">Hot Together</div>
  <!-- Add your other music items here as before -->
</div>
<audio id="musicPlayer"></audio>

<script>
// Countdown (unchanged)
const targetDate = new Date('2026-11-18T00:00:00');
const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');
function pad(n){ return String(n).padStart(2,'0'); }
function updateCountdown(){
  const now = new Date();
  const diff = Math.floor((targetDate - now)/1000);
  if(diff<=0) return;
  daysEl.textContent = Math.floor(diff/86400);
  hoursEl.textContent = pad(Math.floor(diff/3600%24));
  minutesEl.textContent = pad(Math.floor(diff/60%60));
  secondsEl.textContent = pad(diff%60);
}
updateCountdown();
setInterval(updateCountdown,1000);

// Music (unchanged)
const trigger = document.getElementById('musicTrigger');
const wheel = document.getElementById('musicWheel');
const player = document.getElementById('musicPlayer');
let open = false;
trigger.onclick = () => {
  open = !open;
  wheel.classList.toggle('active', open);
};
document.querySelectorAll('.music-item').forEach(btn=>{
  btn.onclick = () => {
    player.src = btn.dataset.song;
    player.play();
  };
});

// Phone Toggle - this works 100%
const phoneBtn = document.getElementById('phoneBtn');
const phoneContainer = document.getElementById('phoneContainer');
let phoneOpen = false;
phoneBtn.onclick = () => {
  phoneOpen = !phoneOpen;
  phoneContainer.classList.toggle('active', phoneOpen);
};
</script>
</body>
</html>
