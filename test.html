<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Leonida Database</title>

    <link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        /* ====== Core Styles ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; color: #fff; }

        body {
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)),
                url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
            display: flex; align-items: center; justify-content: flex-start;
            padding-left: 50px; transition: background-position 0.15s ease-out;
        }

        /* ====== DATABASE SLIDER ====== */
        .assets-trigger {
            position: fixed; top: 50%; right: 0; transform: translateY(-50%);
            width: 40px; height: 120px; background: rgba(0, 255, 224, 0.8);
            backdrop-filter: blur(10px); border-radius: 15px 0 0 15px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 500; transition: 0.3s;
        }
        .assets-trigger span { transform: rotate(-90deg); font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #000; }

        .assets-slider {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(30px);
            z-index: 499; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 60px 30px; border-left: 1px solid rgba(0, 255, 224, 0.3);
        }
        .assets-slider.open { right: 0; }

        .asset-item {
            display: flex; align-items: center; gap: 15px; padding: 18px 0;
            cursor: pointer; color: #fff; font-size: 13px; font-weight: 600;
            transition: 0.3s; letter-spacing: 2px; text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .asset-item:hover { color: #00ffe0; transform: translateX(-10px); }

        /* ====== PAGE MODALS ====== */
        .page-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
            padding: 40px;
        }
        .page-content {
            width: 100%; max-width: 1400px; height: 85vh;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; position: relative; overflow-y: auto;
            display: flex; flex-direction: column;
        }
        .close-page {
            position: absolute; top: 20px; right: 25px;
            font-size: 28px; cursor: pointer; color: #ff4dd2; z-index: 1100;
        }

        /* ====== CONTENT GRIDS ====== */
        .content-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; padding: 30px;
        }
        .asset-card {
            border-radius: 18px; overflow: hidden; position: relative; 
            cursor: pointer; background: #111; border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.4s;
        }
        .asset-card:hover { transform: translateY(-5px); border-color: #00ffe0; box-shadow: 0 0 20px rgba(0,255,224,0.2); }
        .asset-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay {
            position: absolute; inset: 0; display: flex; align-items: flex-end;
            padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
        }

        /* DETAIL MODAL (Bios) */
        .detail-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96);
            display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .detail-modal-content {
            background: #080812; border-radius: 24px; max-width: 950px; width: 90%;
            padding: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .detail-modal img { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* MASONRY GALLERY */
        .screenshot-gallery { column-count: 4; column-gap: 20px; padding: 30px; }
        .gallery-item { break-inside: avoid; margin-bottom: 20px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.03); border-color: #ff4dd2; }

        /* MAIN HUD */
        .main-hud {
            position: relative; z-index: 10; width: 320px; padding: 30px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(1px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px;
        }
        .integrated-clock { display: flex; gap: 8px; margin-bottom: 20px; }
        .unit { padding: 10px 0; border-radius: 6px; background: rgba(0, 0, 0, 0.45); width: 60px; text-align: center; }
        .num { font-size: 22px; font-weight: 600; }
        .integrated-song-list { overflow-y: auto; height: 250px; }
        .track { padding: 10px; font-size: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .track:hover { color: #00ffe0; background: rgba(255,255,255,0.05); }

        @media (max-width: 900px) { .detail-modal-content { grid-template-columns: 1fr; } .screenshot-gallery { column-count: 2; } }
    </style>
</head>
<body>

<div class="assets-trigger" id="assetsTrigger"><span>DATABASE</span></div>
<div class="assets-slider" id="assetsSlider">
    <h2 style="font-size: 11px; letter-spacing: 4px; opacity: 0.5; margin-bottom: 25px;">SYSTEM NAVIGATION</h2>
    <div class="asset-item" onclick="openPage('home')">Home</div>
    <div class="asset-item" onclick="openPage('map')">Leonida Map</div>
    <div class="asset-item" onclick="openPage('characters')">Characters</div>
    <div class="asset-item" onclick="openPage('places')">Places</div>
    <div class="asset-item" onclick="openPage('screenshots')">Screenshots</div>
    <div class="asset-item" onclick="openPage('trailers')">Trailers</div>
</div>

<section class="main-hud">
    <h1 style="font-size: 32px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;"><span style="color:#ff4dd2">GTA</span> <span style="color:#00ffe0">VI</span></h1>
    <div style="font-size: 10px; color: #ff4dd2; margin-bottom: 20px;">LAUNCHING NOV 19, 2026</div>
    <div class="integrated-clock">
        <div class="unit"><div class="num" id="days">000</div><div style="font-size:8px; opacity:0.5;">DAYS</div></div>
        <div class="unit"><div class="num" id="hours">00</div><div style="font-size:8px; opacity:0.5;">HRS</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div style="font-size:8px; opacity:0.5;">MINS</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div style="font-size:8px; opacity:0.5;">SECS</div></div>
    </div>
    <div class="integrated-song-list" id="songList"></div>
</section>

<div class="page-overlay" id="pageOverlay">
    <div class="page-content">
        <span class="close-page" onclick="closePage()">&times;</span>
        <div id="pageData"></div>
    </div>
</div>

<div class="detail-modal" id="detailModal">
    <div class="detail-modal-content">
        <span class="close-page" onclick="closeDetail()">&times;</span>
        <img id="detailImg" src="">
        <div>
            <h2 id="detailTitle" style="color:#00ffe0; margin-bottom:15px; font-size:28px;"></h2>
            <p id="detailDesc" style="font-size:16px; line-height:1.7; opacity:0.8;"></p>
        </div>
    </div>
</div>

<audio id="musicPlayer"></audio>

<script>
/* ===== DATA ===== */
const characterData = [
    {name:"Lucia", img:"gta/npc/lucia.jpg", desc:"Lucia Caminos was raised on the unforgiving streets of Liberty City before relocating to Leonida. She's a high-stakes grifter who refuses to play by the rules, looking to build an empire on her own terms."},
    {name:"Jason", img:"gta/npc/jason.jpg", desc:"Jason Duval grew up in the Leonida Keys. A former military washout with a talent for high-speed escapes, he's a man of few words and violent actions when pushed into a corner."},
    {name:"Dre'Quan Priest", img:"gta/npc/dre.jpg", desc:"A street hustler turned mogul, Dre'Quan runs 'Only Raw Records'. He's the bridge between Vice City's underground music scene and its violent gang territories."},
    {name:"Stefanie", img:"gta/npc/stefanie.png", desc:"A social worker for Leonida Corrections who has seen the system fail too many times. She's at a breaking point, making her a dangerous wildcard in the city's power struggle."},
    {name:"Boobie Ike", img:"gta/npc/boobie.png", desc:"A Vice City legend. Building a music and real estate empire, Ike knows everyone and owns most of them. If you want something done in Vice, you talk to Ike."}
];

const placeData = [
    {name:"Vice City", img:"gta/places/vice.jpg", desc:"Leonida's neon-soaked metropolis where America's glamour, hustle, and greed are turned up to eleven. From pastel art deco towers to the bustling panaderias of Little Cuba."},
    {name:"Leonida Keys", img:"gta/places/leoninda.jpg", desc:"The tropical gateway to paradise—a laid-back chain of islands where luxury beachfront villas mix with hidden coves and shark-infested waters."},
    {name:"Grassrivers", img:"gta/places/grassrivers.jpg", desc:"Leonida's wild, primordial swamp—a sprawling maze of mangroves and sawgrass. Gators own these channels, and airboats are the only way in or out."},
    {name:"Port Gellhorn", img:"gta/places/port.jpg", desc:"A decaying coastal town of abandoned motels and empty strip malls. The new economy runs on cheap beer, dirt bikes, and biker gangs."},
    {name:"Ambrosia", img:"gta/places/ambrosia.jpg", desc:"Old-school Florida heartland built on sugar and hard labor. The massive Allied Crystal refinery dominates the skyline and the local politics."},
    {name:"Mount Kalaga", img:"gta/places/mount.jpg", desc:"The remote, rugged backbone of northern Leonida—dense pine forests, deep ravines, and miles of off-road trails for those who want to be left alone."}
];

const songs = [
    {n:"Hot Together", s:"music/together.mp3"}, 
    {n:"Love Is A Long Road", s:"music/long.mp3"},
    {n:"Night", s:"music/night.mp3"},
    {n:"Ocean Breeze", s:"music/ocean.mp3"},
    {n:"Self Control", s:"music/self.mp3"}
];

const pages = {
    home: ``,
    map: `<iframe src="https://map.stateofleonida.net/" style="width:100%; height:100%; border:0; background:#000;" allowfullscreen></iframe>`,
    characters: `<div style="padding:30px;"><h1 style="text-align:center; margin-bottom:30px; letter-spacing:4px;">PERSONNEL FILES</h1><div class="content-grid" id="charGrid"></div></div>`,
    places: `<div style="padding:30px;"><h1 style="text-align:center; margin-bottom:30px; letter-spacing:4px;">LOCATIONS</h1><div class="content-grid" id="placeGrid"></div></div>`,
    screenshots: `<div style="padding:30px;"><h1 style="text-align:center; margin-bottom:30px; letter-spacing:4px;">GALLERY</h1><div class="screenshot-gallery" id="screenGrid"></div></div>`,
    trailers: `<div style="padding:30px;"><h1 style="text-align:center; margin-bottom:30px; letter-spacing:4px;">OFFICIAL MEDIA</h1><div class="content-grid" id="trailerGrid"></div></div>`
};

/* ===== NAVIGATION ===== */
function openPage(id) {
    if(id === 'home') { closePage(); return; }
    document.getElementById('pageData').innerHTML = pages[id];
    document.getElementById('pageOverlay').style.display = 'flex';
    document.getElementById('assetsSlider').classList.remove('open');

    if(id === 'characters') renderGrid('charGrid', characterData, 'square');
    if(id === 'places') renderGrid('placeGrid', placeData, 'landscape');
    if(id === 'screenshots') renderScreenshots();
}

function renderGrid(containerId, data, type) {
    const grid = document.getElementById(containerId);
    data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'asset-card';
        div.style.aspectRatio = (type === 'square') ? '1/1' : '4/3';
        div.innerHTML = `<img src="${item.img}"><div class="card-overlay"><h2>${item.name}</h2></div>`;
        div.onclick = () => openDetail(item);
        grid.appendChild(div);
    });
}

function renderScreenshots() {
    const grid = document.getElementById('screenGrid');
    for(let i=1; i<=36; i++) {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `<img src="gta/screenshots/${i}.jpg" loading="lazy">`;
        grid.appendChild(div);
    }
}

/* ===== DETAIL MODAL ===== */
function openDetail(item) {
    document.getElementById('detailImg').src = item.img;
    document.getElementById('detailTitle').innerText = item.name;
    document.getElementById('detailDesc').innerText = item.desc;
    document.getElementById('detailModal').style.display = 'flex';
}

function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
function closePage() { document.getElementById('pageOverlay').style.display = 'none'; }

document.getElementById('assetsTrigger').onclick = () => document.getElementById('assetsSlider').classList.toggle('open');

/* ===== HUD LOGIC ===== */
const target = new Date('2026-11-19T00:00:00');
function updateClock() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;
    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('minutes').textContent = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('seconds').textContent = (diff%60).toString().padStart(2, '0');
}
setInterval(updateClock, 1000); updateClock();

const player = document.getElementById('musicPlayer'), list = document.getElementById('songList');
songs.forEach(song => {
    const div = document.createElement('div'); div.className = 'track'; div.innerText = song.n;
    div.onclick = () => { player.src = song.s; player.play(); };
    list.appendChild(div);
});
</script>
</body>
</html>
