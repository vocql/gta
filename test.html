<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leonida OS | Full Database</title>

    <link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; color: #fff; }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('gta/jason.jpg') center/cover no-repeat;
            display: flex; flex-direction: column;
        }

        /* ====== TOP HUD (NAV NEXT TO COUNTDOWN) ====== */
        .top-hud {
            width: 100%; height: 85px; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); z-index: 1000;
        }
        
        .hud-left { display: flex; align-items: center; gap: 20px; }

        .timer-capsule {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 25px; border-radius: 999px; display: flex; align-items: center; gap: 15px;
            font-weight: 900; font-size: 14px; color: #00ffe0; letter-spacing: 1px;
        }

        .nav-group { display: flex; gap: 6px; }
        .nav-btn {
            padding: 10px 16px; border-radius: 8px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; color: rgba(255,255,255,0.6); border: 1px solid transparent;
            transition: 0.2s; background: rgba(255, 255, 255, 0.03);
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(255, 77, 210, 0.15); color: #ff4dd2; border-color: #ff4dd2; }

        /* ====== MAIN INTERFACE ====== */
        .main-layout { display: flex; flex: 1; overflow: hidden; }

        /* Left Side Radio */
        .side-hud { 
            width: 380px; padding: 40px; background: rgba(10, 10, 15, 0.85); 
            border-right: 1px solid rgba(255, 255, 255, 0.05); overflow-y: auto; 
        }
        .track { padding: 18px 12px; font-size: 13px; color: rgba(255,255,255,0.5); cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .track:hover, .track.active { color: #00ffe0; background: rgba(0,255,224,0.05); padding-left: 25px; }

        /* CONTENT WINDOW (DYNAMIC) */
        .content-area { 
            flex: 1; background: rgba(0,0,0,0.3); position: relative; 
            overflow-y: auto; padding: 40px; 
        }
        .content-area::-webkit-scrollbar { width: 5px; }
        .content-area::-webkit-scrollbar-thumb { background: #ff4dd2; }

        /* Grids and Items */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { border-radius: 15px; overflow: hidden; position: relative; aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.1); background: #000; }
        .card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .card:hover img { opacity: 1; transform: scale(1.05); }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }
        
        .shot-grid { column-count: 3; column-gap: 15px; }
        .shot-grid img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }

        iframe.full-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        @media (max-width: 1200px) { .side-hud { width: 280px; } .shot-grid { column-count: 2; } }
    </style>
</head>
<body>

<header class="top-hud">
    <div class="hud-left">
        <h2 style="letter-spacing: 2px; font-weight: 900; font-size: 15px;">LEONIDA <span style="color:#ff4dd2">OS</span></h2>
        <div class="timer-capsule"><span id="countdown">000 : 00 : 00 : 00</span></div>
        <nav class="nav-group">
            <div class="nav-btn active" onclick="loadContent('map', this)">Satellite</div>
            <div class="nav-btn" onclick="loadContent('chars', this)">Personnel</div>
            <div class="nav-btn" onclick="loadContent('places', this)">Locations</div>
            <div class="nav-btn" onclick="loadContent('shots', this)">Gallery</div>
            <div class="nav-btn" onclick="loadContent('trailer', this)">Trailer</div>
        </nav>
    </div>
    <div style="font-size: 10px; font-weight: 900; opacity: 0.5; letter-spacing: 1px;">X @XLAZEFPS</div>
</header>

<div class="main-layout">
    <aside class="side-hud">
        <h3 style="font-size: 11px; color: #ff4dd2; letter-spacing: 3px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">VICE CITY RADIO</h3>
        <div id="radioList"></div>
    </aside>

    <main class="content-area" id="mainDisplay">
        <iframe class="full-map" src="https://map.stateofleonida.net/"></iframe>
    </main>
</div>

<audio id="musicPlayer"></audio>

<script>
const characters = [
    {n:"Lucia", i:"gta/npc/lucia.jpg", d:"Ex-con raised in Liberty City, Lucia is determined to rewrite her future after Leonida Penitentiary."},
    {n:"Jason", i:"gta/npc/jason.jpg", d:"Army veteran turned drug runner for Brian Heder. Meeting Lucia changed the stakes."},
    {n:"Dre'Quan Preist", i:"gta/npc/dre.jpg", d:"Owner of Only Raw Records. Bridging Vice City's underground and the spotlight."},
    {n:"Stefanie", i:"gta/npc/stefanie.png", d:"Social worker for Leonida Corrections pushed to her breaking point."},
    {n:"Cal Hampton", i:"gta/npc/cal.png", d:"Jason's paranoid, tech-savvy buddy who monitors Coast Guard chatter."},
    {n:"Boobie Ike", i:"gta/npc/boobie.png", d:"Vice City legend, real estate mogul, and owner of the Jack of Hearts."},
    {n:"Roxy", i:"gta/npc/dimez.webp", d:"One half of Real Dimez. Street-hustle rap star signed to Only Raw Records."},
    {n:"Raul Bautista", i:"gta/npc/raul.png", d:"Veteran bank robber with old-school charm and ice-cold precision."},
    {n:"Brian Heder", i:"gta/npc/brian.png", d:"Old-school drug kingpin from the glory days of Keys smuggling."},
    {n:"Luxe", i:"gta/npc/luxe.webp", d:"Viral rap star of Real Dimez, fiercely ambitious and hungry for the throne."}
];

const places = [
    {n:"Vice City", i:"gta/places/vice.jpg", d:"The neon heart of Leonida. Glamour, hustle, and greed."},
    {n:"Leonida Keys", i:"gta/places/leoninda.jpg", d:"A tropical gateway with luxury villas and shark-infested waters."},
    {n:"Grassrivers", i:"gta/places/grassrivers.jpg", d:"The primordial swamp maze. Gators own these channels."},
    {n:"Port Gellhorn", i:"gta/places/port.jpg", d:"Decaying coastal town ruled by bikers and cheap beer."}
];

function loadContent(page, btn) {
    const display = document.getElementById('mainDisplay');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    display.innerHTML = '';
    display.style.padding = "40px";

    if(page === 'map') {
        display.style.padding = "0";
        display.innerHTML = `<iframe class="full-map" src="https://map.stateofleonida.net/"></iframe>`;
    } else if(page === 'chars') {
        let h = '<div class="grid">';
        characters.forEach(c => { h += `<div class="card"><img src="${c.i}"><div class="card-info"><h3>${c.n}</h3><p style="font-size:11px; opacity:0.6; margin-top:5px;">${c.d}</p></div></div>`; });
        display.innerHTML = h + '</div>';
    } else if(page === 'places') {
        let h = '<div class="grid">';
        places.forEach(p => { h += `<div class="card" style="aspect-ratio:16/9"><img src="${p.i}"><div class="card-info"><h3>${p.n}</h3><p style="font-size:11px; opacity:0.6;">${p.d}</p></div></div>`; });
        display.innerHTML = h + '</div>';
    } else if(page === 'shots') {
        let h = '<div class="shot-grid">';
        for(let i=1; i<=24; i++) h += `<img src="gta/screenshots/${i}.jpg">`;
        display.innerHTML = h + '</div>';
    } else if(page === 'trailer') {
        display.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/QdBZY2fkU-0?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:20px; border:1px solid #ff4dd2;"></iframe>`;
    }
}

/* RADIO & CLOCK */
const radio = ["Hot Together", "Love Is A Long Road", "Night", "Ocean Breeze", "Self Control", "Atomic", "Vice City"];
const rl = document.getElementById('radioList');
radio.forEach(t => {
    const d = document.createElement('div'); d.className='track'; d.innerText=t;
    d.onclick = () => { 
        document.querySelectorAll('.track').forEach(el=>el.classList.remove('active')); d.classList.add('active');
        document.getElementById('musicPlayer').src = `music/${t.toLowerCase().replace(/ /g, '')}.mp3`;
        document.getElementById('musicPlayer').play();
    };
    rl.appendChild(d);
});

const target = new Date('2026-11-19T00:00:00');
function update() {
    const diff = Math.floor((target - new Date())/1000);
    const d = Math.floor(diff/86400), h = Math.floor(diff/3600%24), m = Math.floor(diff/60%60), s = diff%60;
    document.getElementById('countdown').innerText = `${d} : ${h.toString().padStart(2,'0')} : ${m.toString().padStart(2,'0')} : ${s.toString().padStart(2,'0')}`;
}
setInterval(update, 1000); update();
</script>
</body>
</html>
