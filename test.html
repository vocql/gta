<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Leonida OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100vh; overflow: hidden; background: #050505; color: #fff; font-family: 'Exo 2', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.3)), url('gta/jason.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        body::after {
            content: ""; position: fixed; inset: 0; z-index: 100; pointer-events: none; opacity: 0.2;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px;
        }

        header {
            position: fixed; top: 10px; right: 40px; z-index: 200;
            display: flex; gap: 8px; padding: 5px; border-radius: 50px;
            background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        .nav-btn {
            padding: 8px 15px; border-radius: 50px; color: #fff; font-size: 10px; font-weight: 900; 
            text-decoration: none; text-transform: uppercase; transition: 0.3s;
        }
        .nav-btn.active { background: #00ffe0; color: #000; }

        .container {
            display: grid; grid-template-columns: 320px 380px 1fr; gap: 20px;
            width: 100%; height: 85vh; max-width: 1800px; z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; backdrop-filter: blur(15px); display: flex; flex-direction: column; overflow: hidden;
        }

        /* PANEL 1: HUD & FULL RADIO */
        .hud-top { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .gta-logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 15px; }
        .neon-p { color: #ff4dd2; text-shadow: 0 0 10px #ff4dd2; }
        .neon-b { color: #00ffe0; text-shadow: 0 0 10px #00ffe0; }
        
        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .t-box { background: rgba(255,255,255,0.05); padding: 10px 0; border-radius: 5px; text-align: center; }
        .t-num { font-size: 18px; font-weight: 900; display: block; }
        .t-lab { font-size: 7px; opacity: 0.5; font-weight: 900; }

        .radio-wrap { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .radio-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .shuffle { background: transparent; color: #00ffe0; border: 1px solid #00ffe0; padding: 4px 10px; border-radius: 4px; font-size: 8px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .shuffle:hover { background: rgba(0, 255, 224, 0.1); }
        input[type=range] { width: 100%; accent-color: #ff4dd2; margin-bottom: 15px; cursor: pointer; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; appearance: none; }
        
        .song-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        .song-list::-webkit-scrollbar { width: 3px; }
        .song-list::-webkit-scrollbar-thumb { background: #ff4dd2; border-radius: 10px; }
        .track { padding: 10px; font-size: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); opacity: 0.6; transition: 0.2s; }
        .track:hover, .track.active { opacity: 1; color: #ff4dd2; background: rgba(255,77,210,0.1); border-left: 2px solid #ff4dd2; }

        /* PANEL 2: TRAILERS & RANDOM */
        .trailer-tabs { display: flex; }
        .tab { flex: 1; padding: 15px; border: none; background: rgba(255,255,255,0.03); color: #fff; font-size: 9px; font-weight: 900; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab.active { background: rgba(0,255,224,0.1); color: #00ffe0; border-bottom: 2px solid #00ffe0; }
        .vid-frame { width: 100%; height: 215px; background: #000; border: none; }

        .random-box { flex: 1; padding: 25px; font-family: 'Courier New', monospace; font-size: 11px; color: #00ffe0; overflow-y: auto; }
        .log { margin-bottom: 10px; border-left: 2px solid #00ffe0; padding-left: 10px; opacity: 0.8; }
        .alert { color: #ff4dd2; border-color: #ff4dd2; }

        /* PANEL 3: MAP */
        .map-frame { width: 100%; height: 100%; border: none; overflow: hidden; }

    </style>
</head>
<body>

<header>
    <a href="index.html" class="nav-btn">Home</a>
    <a href="map.html" class="nav-btn active">Map</a>
    <a href="characters.html" class="nav-btn">Characters</a>
    <a href="#" class="nav-btn">Places</a>
</header>

<div class="container">
    <div class="panel">
        <div class="hud-top">
            <div class="gta-logo"><span class="neon-p">GTA</span> <span class="neon-b">VI</span></div>
            <div class="timer">
                <div class="t-box"><span class="t-num" id="d">000</span><span class="t-lab">DAYS</span></div>
                <div class="t-box"><span class="t-num" id="h">00</span><span class="t-lab">HRS</span></div>
                <div class="t-box"><span class="t-num" id="m">00</span><span class="t-lab">MINS</span></div>
                <div class="t-box"><span class="t-num" id="s">00</span><span class="t-lab">SECS</span></div>
            </div>
        </div>
        <div class="radio-wrap">
            <div class="radio-head">
                <span style="font-size:9px; letter-spacing:2px; opacity:0.5;">VICE CITY RADIO</span>
                <button class="shuffle" onclick="shuffle()">SHUFFLE</button>
            </div>
            <input type="range" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
            <div class="song-list" id="sList"></div>
        </div>
    </div>

    <div class="panel">
        <div class="trailer-tabs">
            <button class="tab active" onclick="swapVid('QdBZY2fkU-0', this)">TRAILER 1</button>
            <button class="tab" onclick="swapVid('VQRLujxTm3c', this)">TRAILER 2</button>
        </div>
        <iframe id="vFrame" class="vid-frame" src="https://www.youtube.com/embed/QdBZY2fkU-0" allowfullscreen></iframe>
        <div class="random-box">
            <div style="font-weight:900; color:#ff4dd2; margin-bottom:15px;">[ LEONIDA LIVE INTEL ]</div>
            <div class="log">> SATELLITE LINK: STABLE</div>
            <div class="log">> AREA: KELLY COUNTY / VICE CITY</div>
            <div class="log alert">> HIGH SPEED CHASE REPORTED ON I-95</div>
            <div class="log">> TEMP: 89°F // WIND: 12MPH SE</div>
            <div class="log">> DATA_ENCRYPTION: AES-256 ACTIVE</div>
            <div class="log">> REVENUE_ESTIMATE: $1.2B (PRE-ORDER)</div>
        </div>
    </div>

    <div class="panel">
        <iframe src="https://map.stateofleonida.net/" class="map-frame" scrolling="no"></iframe>
    </div>
</div>

<audio id="player"></audio>

<script>
    /* RADIO - FULL 25 SONG SUITE */
    const songs = [
        "Hot Together", "Love Is A Long Road", "Night", "Ocean Breeze", "Self Control", 
        "Atomic", "Sun Glasses At Night", "All Night Long", "Shame", "Vice City", 
        "I Walk This Earth All By Myself", "Owner Of A Lonley Heart", "Tempted", 
        "Poison Arrow", "Is It A Crime", "Here We Are", "Through The Fire", 
        "Heart Of Mine", "Fly Away", "Ain't Nobody", "Thinking Of You", 
        "Sweet Love", "I Still Remember You", "Gamble With My Love", "Sukiyaki"
    ];
    
    const list = document.getElementById('sList');
    songs.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'track'; d.innerText = `${String(i+1).padStart(2, '0')}. ${s}`;
        d.onclick = () => { 
            document.querySelectorAll('.track').forEach(t=>t.classList.remove('active')); 
            d.classList.add('active'); 
            d.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };
        list.appendChild(d);
    });

    function setVol(v) { document.getElementById('player').volume = v; }
    function shuffle() { 
        const t = document.querySelectorAll('.track'); 
        t[Math.floor(Math.random()*t.length)].click(); 
    }

    /* VIDEO TABS */
    function swapVid(id, btn) {
        document.getElementById('vFrame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        btn.classList.add('active');
    }

    /* COUNTDOWN */
    const end = new Date('2026-11-19T00:00:00');
    setInterval(() => {
        const diff = Math.floor((end - new Date())/1000);
        if(diff <= 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400).toString().padStart(3,'0');
        document.getElementById('h').innerText = Math.floor(diff/3600%24).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor(diff/60%60).toString().padStart(2,'0');
        document.getElementById('s').innerText = (diff%60).toString().padStart(2,'0');
    }, 1000);
</script>
</body>
</html>
