<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leonida OS | GTA VI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        /* ====== CORE INTERFACE ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; color: #fff; }

        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), url('gta/jason.jpg') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: flex-start; padding-left: 40px;
        }

        /* ====== FIXED LEFT SIDEBAR ====== */
        .sidebar {
            width: 320px; height: 85vh; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px;
            display: flex; flex-direction: column; padding: 30px; z-index: 100;
        }
        .title { font-family: 'Orbitron'; font-size: 32px; font-weight: 900; font-style: italic; margin-bottom: 20px; }
        .neon-gta { color: #ff4dd2; text-shadow: 0 0 15px #ff4dd2; }
        .neon-vi { color: #00ffe0; text-shadow: 0 0 15px #00ffe0; }

        .clock-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .unit { background: rgba(255,255,255,0.03); padding: 10px 0; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .num { font-family: 'Orbitron'; font-size: 16px; font-weight: 700; color: #fff; }
        .lab { font-family: 'Orbitron'; font-size: 7px; opacity: 0.5; text-transform: uppercase; margin-top: 3px; }

        /* ====== DYNAMIC CENTER HUD ====== */
        .hud-viewports {
            flex: 1; height: 85vh; margin: 0 40px; background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(10px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow-y: auto; overflow-x: hidden;
        }
        .hud-viewports::-webkit-scrollbar { width: 5px; }
        .hud-viewports::-webkit-scrollbar-thumb { background: #00ffe0; border-radius: 10px; }

        /* Navigation fixed at top of viewport */
        .top-nav {
            position: sticky; top: 0; left: 0; right: 0; padding: 20px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            display: flex; justify-content: center; gap: 10px; z-index: 50;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn {
            padding: 8px 16px; border-radius: 999px; color: #fff; font-family: 'Orbitron';
            font-size: 9px; font-weight: 700; text-decoration: none; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .nav-btn:hover, .nav-btn.active { background: #00ffe0; color: #000; border-color: #00ffe0; }

        /* Content Pages */
        .page-content { padding: 40px; display: none; }
        .page-content.active { display: block; }

        /* ====== CHARACTER/PLACE GRIDS ====== */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .item-card { 
            aspect-ratio: 1/1; border-radius: 15px; overflow: hidden; position: relative; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
        }
        .item-card:hover { transform: scale(1.03); border-color: #ff4dd2; box-shadow: 0 0 20px rgba(255,77,210,0.3); }
        .item-card img { width: 100%; height: 100%; object-fit: cover; }
        .item-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); display: flex; align-items: flex-end; padding: 15px; }
        .item-overlay h3 { font-family: 'Orbitron'; font-size: 14px; text-transform: uppercase; }

        /* Modal styling */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-box { background: #080812; border: 1px solid #00ffe0; border-radius: 20px; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 30px; position: relative; }
        .modal-box img { width: 100%; border-radius: 10px; }
        .close { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #ff4dd2; font-family: 'Orbitron'; }

        /* Radio Sidebar Parts */
        .radio-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .song-list { overflow-y: auto; flex: 1; font-size: 10px; margin-top: 10px; }
        .song-list::-webkit-scrollbar { width: 2px; }
        .track { padding: 8px; opacity: 0.6; cursor: pointer; transition: 0.2s; }
        .track:hover { opacity: 1; color: #00ffe0; }
        .track.active { color: #ff4dd2; opacity: 1; font-weight: 700; border-left: 2px solid #ff4dd2; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="title"><span class="neon-gta">GTA</span> <span class="neon-vi">VI</span></div>
    <div class="clock-grid">
        <div class="unit"><div class="num" id="d">000</div><div class="lab">Day</div></div>
        <div class="unit"><div class="num" id="h">00</div><div class="lab">Hrs</div></div>
        <div class="unit"><div class="num" id="m">00</div><div class="lab">Min</div></div>
        <div class="unit"><div class="num" id="s">00</div><div class="lab">Sec</div></div>
    </div>
    <div class="radio-section">
        <div style="font-family:'Orbitron'; font-size: 9px; color:#00ffe0; display:flex; justify-content:space-between;">
            RADIO<span>VOL</span>
        </div>
        <input type="range" min="0" max="1" step="0.01" value="0.5" style="width:100%; accent-color:#ff4dd2; margin:10px 0;">
        <div class="song-list" id="sidebarSongs"></div>
    </div>
</aside>

<main class="hud-viewports">
    <nav class="top-nav">
        <div class="nav-btn active" onclick="showPage('chars')">Characters</div>
        <div class="nav-btn" onclick="showPage('places')">Places</div>
        <div class="nav-btn" onclick="showPage('shots')">Screenshots</div>
        <div class="nav-btn" onclick="showPage('trailers')">Trailers</div>
    </nav>

    <div id="page-chars" class="page-content active">
        <div class="grid-layout" id="charGrid"></div>
    </div>

    <div id="page-places" class="page-content">
        <div class="grid-layout" id="placeGrid"></div>
    </div>

    <div id="page-shots" class="page-content">
        <div class="grid-layout" id="shotGrid" style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));"></div>
    </div>

    <div id="page-trailers" class="page-content">
        <div style="display:grid; gap:20px;">
            <div style="background:#000; aspect-ratio:16/9; border-radius:15px; display:flex; align-items:center; justify-content:center;">[ TRAILER 1 PLAYER ]</div>
            <div style="background:#000; aspect-ratio:16/9; border-radius:15px; display:flex; align-items:center; justify-content:center;">[ TRAILER 2 PLAYER ]</div>
        </div>
    </div>
</main>

<div class="modal" id="infoModal">
    <div class="modal-box">
        <span class="close" onclick="closeModal()">✕</span>
        <img id="modalImg" src="">
        <div>
            <h2 id="modalTitle" style="font-family:'Orbitron'; color:#00ffe0; margin-bottom:15px;"></h2>
            <p id="modalDesc" style="font-size:14px; line-height:1.6; opacity:0.8;"></p>
        </div>
    </div>
</div>

<script>
/* DATA INJECTION */
const characters = [
    {name: "Lucia", img: "gta/npc/lucia.jpg", desc: "Raised on the streets of Liberty City, Lucia is single-minded in her determination to rewrite her future after her release from Leonida Penitentiary."},
    {name: "Jason", img: "gta/npc/jason.jpg", desc: "A former army man turned drug runner. Meeting Lucia pulls him into a high-stakes Bonnie-and-Clyde romance."},
    {name: "Dre'Quan Priest", img: "gta/npc/dre.jpg", desc: "Ambitious and savvy, Dre'Quan bridges the gap between Vice City's underground and its legitimate spotlight."},
    {name: "Stefanie", img: "gta/npc/stefanie.png", desc: "A social worker for Leonida Corrections ready to break the rules to help those caught in the cycle."},
    {name: "Cal Hampton", img: "gta/npc/cal.png", desc: "Jason's paranoid buddy who monitors Coast Guard radio chatter and diving into 'research'."},
    {name: "Boobie Ike", img: "gta/npc/boobie.png", desc: "Vice City legend. Owner of the Jack of Hearts strip club and a recording studio powerhouse."},
    {name: "Roxy", img: "gta/npc/dimez.webp", desc: "One half of Real Dimez, turning dealer shake-downs into viral rap tracks and massive clout."},
    {name: "Raul Bautista", img: "gta/npc/raul.png", desc: "Veteran bank robber known for old-school charm and ice-cold precision."},
    {name: "Brian Heder", img: "gta/npc/brian.png", desc: "Old-school drug kingpin from the glory days of Keys smuggling, running ops from his boat yard."},
    {name: "Luxe", img: "gta/npc/luxe.webp", desc: "One half of Real Dimez, fiercely ambitious and hungry to claim the throne in the music game."}
];

const places = [
    {name: "Vice City", img: "gta/places/vice.jpg", desc: "The neon-soaked heart of Leonida, where luxury meets the underworld."},
    {name: "Leonida Keys", img: "gta/places/keys.jpg", desc: "A sprawling chain of islands home to smugglers, grifters, and pristine waters."},
    {name: "Grassrivers", img: "gta/places/grass.jpg", desc: "The dangerous, humid marshlands perfect for laying low or moving product."},
    {name: "Port Gellhorn", img: "gta/places/port.jpg", desc: "An industrial hub with a gritty atmosphere and high criminal activity."},
    {name: "Ambrosia", img: "gta/places/ambrosia.jpg", desc: "A rural town with secrets buried deep in the Leonida countryside."},
    {name: "Mount Kalaga", img: "gta/places/mount.jpg", desc: "The highest point in the region, offering a tactical view of the entire state."}
];

/* INITIALIZE GRIDS */
function init() {
    const cGrid = document.getElementById('charGrid');
    characters.forEach(c => cGrid.innerHTML += createCard(c));

    const pGrid = document.getElementById('placeGrid');
    places.forEach(p => pGrid.innerHTML += createCard(p));

    const sGrid = document.getElementById('shotGrid');
    for(let i=1; i<=36; i++) {
        sGrid.innerHTML += `<div class="item-card"><img src="gta/screenshots/${i}.jpg"></div>`;
    }

    const sList = document.getElementById('sidebarSongs');
    ["Hot Together", "Love Is A Long Road", "Night", "Ocean Breeze", "Self Control"].forEach(t => {
        sList.innerHTML += `<div class="track">${t}</div>`;
    });
}

function createCard(item) {
    return `<div class="item-card" onclick="openModal('${item.name}', '${item.img}', '${item.desc}')">
        <img src="${item.img}">
        <div class="item-overlay"><h3>${item.name}</h3></div>
    </div>`;
}

function showPage(id) {
    document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    event.target.classList.add('active');
}

function openModal(t, i, d) {
    document.getElementById('modalTitle').innerText = t;
    document.getElementById('modalImg').src = i;
    document.getElementById('modalDesc').innerText = d;
    document.getElementById('infoModal').classList.add('active');
}
function closeModal() { document.getElementById('infoModal').classList.remove('active'); }

/* COUNTDOWN */
const target = new Date('2026-11-19T00:00:00');
setInterval(() => {
    const diff = Math.floor((target - new Date())/1000);
    document.getElementById('d').innerText = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('h').innerText = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('m').innerText = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('s').innerText = (diff%60).toString().padStart(2, '0');
}, 1000);

init();
</script>
</body>
</html>
