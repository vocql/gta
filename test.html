<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GTA VI | Leonida OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Exo 2', sans-serif; color: #fff; }

        body {
            background: url('gta/jason.jpg') center/cover no-repeat;
            display: flex; flex-direction: column;
            padding: 40px;
        }

        /* ====== TOP NAVBAR ====== */
        .top-nav {
            position: absolute; top: 30px; right: 40px; display: flex; gap: 10px; z-index: 1000;
        }
        .nav-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); padding: 8px 18px; border-radius: 999px;
            font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; letter-spacing: 1px; color: rgba(255,255,255,0.7);
        }
        .nav-btn:hover, .nav-btn.active { background: #00ffe0; color: #000; border-color: #00ffe0; box-shadow: 0 0 15px rgba(0,255,224,0.4); }

        /* ====== MAIN INTERFACE LAYOUT ====== */
        .main-container { display: flex; width: 100%; height: 100%; gap: 40px; align-items: flex-start; }

        /* LEFT FLOATING WIDGET (FROM YOUR IMAGE) */
        .left-widget {
            width: 360px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px);
            border-radius: 30px; padding: 40px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; flex-shrink: 0;
        }

        .neon-logo { font-size: 50px; font-weight: 900; font-style: italic; margin-bottom: 5px; letter-spacing: -2px; }
        .pink-text { color: #ff4dd2; text-shadow: 0 0 15px #ff4dd2; }
        .cyan-text { color: #00ffe0; text-shadow: 0 0 15px #00ffe0; }
        .sub-text { font-size: 11px; font-weight: 900; color: #ff4dd2; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }

        /* Countdown Grid */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; }
        .timer-box { background: rgba(255,255,255,0.05); padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .timer-val { font-size: 24px; font-weight: 900; display: block; }
        .timer-label { font-size: 9px; opacity: 0.5; text-transform: uppercase; font-weight: 900; }

        /* Radio Section */
        .radio-wrap { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .radio-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .radio-title { font-size: 11px; font-weight: 900; opacity: 0.4; letter-spacing: 2px; }
        
        .seeker { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; margin-bottom: 25px; }
        .seeker-fill { width: 65%; height: 100%; background: #ff4dd2; border-radius: 2px; box-shadow: 0 0 10px #ff4dd2; }
        .seeker-knob { position: absolute; right: 0; top: -6px; width: 14px; height: 14px; background: #ff4dd2; border-radius: 50%; border: 2px solid #000; }

        .track-list { height: 280px; overflow-y: auto; padding-right: 10px; }
        .track-list::-webkit-scrollbar { width: 4px; }
        .track-list::-webkit-scrollbar-thumb { background: #ff4dd2; border-radius: 10px; }
        .track-item { padding: 12px 0; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .track-item:hover, .track-item.active { color: #fff; padding-left: 10px; }

        /* RIGHT DYNAMIC ZONE (YOUR WHITE SQUARE) */
        .dynamic-zone {
            flex: 1; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            position: relative; transition: 0.5s;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Grid layouts for internal pages */
        .page-content { padding: 40px; height: 100%; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card-item { background: #000; border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); aspect-ratio: 1/1; position: relative; }
        .card-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .card-desc { position: absolute; bottom: 0; padding: 20px; width: 100%; background: linear-gradient(transparent, #000); }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-btn active" onclick="loadPage('map', this)">Map</div>
    <div class="nav-btn" onclick="loadPage('chars', this)">Characters</div>
    <div class="nav-btn" onclick="loadPage('places', this)">Places</div>
    <div class="nav-btn" onclick="loadPage('shots', this)">Screenshots</div>
    <div class="nav-btn" onclick="loadPage('trailers', this)">Trailers</div>
</nav>

<div class="main-container">
    <aside class="left-widget">
        <h1 class="neon-logo"><span class="pink-text">GTA</span> <span class="cyan-text">VI</span></h1>
        <p class="sub-text">Preparing for Nov 19, 2026</p>

        <div class="timer-grid">
            <div class="timer-box"><span class="timer-val" id="d">000</span><span class="timer-label">Days</span></div>
            <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
            <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Mins</span></div>
            <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Secs</span></div>
        </div>

        <div class="radio-wrap">
            <div class="radio-header">
                <span class="radio-title">VICE CITY RADIO</span>
            </div>
            <div class="seeker"><div class="seeker-fill"><div class="seeker-knob"></div></div></div>
            <div class="track-list" id="trackList"></div>
        </div>
    </aside>

    <main class="dynamic-zone" id="display">
        <iframe src="https://map.stateofleonida.net/"></iframe>
    </main>
</div>

<audio id="player"></audio>

<script>
/* DATASET */
const characters = [
    {n:"Lucia", i:"gta/npc/lucia.jpg", d:"Ex-con with a vision for a new empire."},
    {n:"Jason", i:"gta/npc/jason.jpg", d:"Former military tactician with a dark past."},
    {n:"Dre'Quan", i:"gta/npc/dre.jpg", d:"The kingpin of Vice City's underground scene."},
    {n:"Boobie Ike", i:"gta/npc/boobie.png", d:"Vice City's legendary mogul."}
];

function loadPage(type, btn) {
    const display = document.getElementById('display');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    if(type === 'map') {
        display.innerHTML = `<iframe src="https://map.stateofleonida.net/"></iframe>`;
    } else if(type === 'chars') {
        let html = '<div class="page-content"><div class="grid">';
        characters.forEach(c => {
            html += `<div class="card-item"><img src="${c.i}"><div class="card-desc"><h3>${c.n}</h3><p style="font-size:11px; opacity:0.5;">${c.d}</p></div></div>`;
        });
        display.innerHTML = html + '</div></div>';
    } else if(type === 'trailers') {
        display.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/QdBZY2fkU-0?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    }
}

/* RADIO LOGIC */
const tracks = ["Hot Together", "Love Is A Long Road", "Night", "Ocean Breeze", "Self Control", "Atomic", "Vice City"];
const list = document.getElementById('trackList');
tracks.forEach(t => {
    const div = document.createElement('div');
    div.className = 'track-item';
    div.innerText = t;
    div.onclick = () => {
        document.querySelectorAll('.track-item').forEach(i => i.classList.remove('active'));
        div.classList.add('active');
        document.getElementById('player').src = `music/${t.toLowerCase().replace(/ /g, '')}.mp3`;
        document.getElementById('player').play();
    };
    list.appendChild(div);
});

/* COUNTDOWN LOGIC */
const target = new Date('2026-11-19T00:00:00');
function update() {
    const diff = Math.floor((target - new Date()) / 1000);
    document.getElementById('d').innerText = Math.floor(diff / 86400);
    document.getElementById('h').innerText = Math.floor(diff / 3600 % 24).toString().padStart(2, '0');
    document.getElementById('m').innerText = Math.floor(diff / 60 % 60).toString().padStart(2, '0');
    document.getElementById('s').innerText = (diff % 60).toString().padStart(2, '0');
}
setInterval(update, 1000); update();
</script>
</body>
</html>
