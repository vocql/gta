<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Leonida OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { 
            height: 100vh; overflow: hidden; background: #050505; color: #fff; font-family: 'Exo 2', sans-serif;
            transform: translateZ(0); /* Hardware Acceleration */
        }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.4)), url('gta/jason.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .container {
            display: grid; grid-template-columns: 320px 500px 1fr; gap: 20px;
            width: 100%; height: 92vh; max-width: 1900px; z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.9); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        /* --- THE ORIGINAL LARGE NEON HEADER --- */
        .hud-top { padding: 30px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .gta-logo { font-size: 48px; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; }
        .neon-p { color: #ff4dd2; text-shadow: 0 0 10px #ff4dd2, 0 0 20px #ff4dd2, 0 0 30px #ff4dd2; }
        .neon-b { color: #00ffe0; text-shadow: 0 0 10px #00ffe0, 0 0 20px #00ffe0, 0 0 30px #00ffe0; }
        
        .timer-row { 
            font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 2px;
            display: flex; justify-content: center; gap: 10px; align-items: center;
        }
        .t-unit { display: flex; flex-direction: column; align-items: center; }
        .t-val { color: #00ffe0; text-shadow: 0 0 10px rgba(0,255,224,0.5); }
        .t-label { font-size: 8px; color: #ff4dd2; text-transform: uppercase; margin-top: -5px; }

        /* --- RADIO --- */
        .radio-wrap { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .vol-slider { width: 100%; accent-color: #ff4dd2; margin-bottom: 15px; cursor: pointer; height: 4px; appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .song-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: #ff4dd2 transparent; }
        .track { padding: 12px; font-size: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); opacity: 0.5; transition: 0.2s; }
        .track.active { opacity: 1; color: #00ffe0; background: rgba(0, 255, 224, 0.05); border-left: 3px solid #ff4dd2; }

        /* --- VIDEO PANEL (LAG OPTIMIZED) --- */
        .slider-controls {
            display: flex; justify-content: space-between; align-items: center;
            background: #000; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .slide-btn, .fs-btn { 
            background: #111; border: 1px solid rgba(255,255,255,0.2); color: #fff; 
            padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: 900;
        }
        .slide-btn:hover { border-color: #00ffe0; color: #00ffe0; }
        .slide-counter { font-size: 11px; font-weight: 900; color: #ff4dd2; letter-spacing: 2px; }

        .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .vid-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .intel-area { flex: 1; padding: 25px; background: #050505; }
        #bootLog { font-family: monospace; font-size: 11px; color: #00ffe0; line-height: 1.8; }

        /* --- MAP PANEL --- */
        .map-frame { width: 100%; height: 100%; border: none; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="hud-top">
            <div class="gta-logo"><span class="neon-p">GTA</span> <span class="neon-b">VI</span></div>
            <div class="timer-row">
                <div class="t-unit"><span class="t-val" id="d">000</span><span class="t-label">Days</span></div>
                <span>:</span>
                <div class="t-unit"><span class="t-val" id="h">00</span><span class="t-label">Hrs</span></div>
                <span>:</span>
                <div class="t-unit"><span class="t-val" id="m">00</span><span class="t-label">Mins</span></div>
                <span>:</span>
                <div class="t-unit"><span class="t-val" id="s">00</span><span class="t-label">Secs</span></div>
            </div>
        </div>
        <div class="radio-wrap">
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
            <div class="song-list" id="sList"></div>
        </div>
    </div>

    <div class="panel">
        <div class="slider-controls">
            <button class="slide-btn" onclick="changeTrailer(-1)">PREV</button>
            <div class="slide-counter" id="slideNum">ARCHIVE 01</div>
            <button class="slide-btn" onclick="changeTrailer(1)">NEXT</button>
            <button class="fs-btn" onclick="toggleMute()" id="muteBtn">MUTE</button>
        </div>
        <div class="video-container" id="videoBox">
            <iframe id="vFrame" class="vid-frame" src="https://www.youtube.com/embed/QdBZY2fkU-0?enablejsapi=1&rel=0&showinfo=0"></iframe>
        </div>
        <div class="intel-area">
            <div id="bootLog"></div>
        </div>
    </div>

    <div class="panel">
        <iframe src="https://map.stateofleonida.net/" class="map-frame" scrolling="no"></iframe>
    </div>
</div>

<audio id="player"></audio>

<script>
    const musicPlayer = document.getElementById('player');
    const vFrame = document.getElementById('vFrame');
    const trailers = ["QdBZY2fkU-0", "VQRLujxTm3c"];
    let currentIdx = 0;
    let isMuted = false;

    /* SYSTEM LOG */
    const bootLines = ["> BOOTING LEONIDA OS...", "> DECRYPTING VIDEO...", "> SYNCING SATELLITE...", "> STATUS: READY"];
    function typeLog() {
        const log = document.getElementById('bootLog');
        log.innerHTML = "";
        bootLines.forEach((line, i) => {
            setTimeout(() => {
                let d = document.createElement('div');
                d.textContent = line;
                log.appendChild(d);
            }, i * 400);
        });
    }
    window.onload = typeLog;

    /* TRAILER ENGINE */
    function changeTrailer(dir) {
        currentIdx = (currentIdx + dir + trailers.length) % trailers.length;
        const mute = isMuted ? "&mute=1" : "";
        vFrame.src = `https://www.youtube.com/embed/${trailers[currentIdx]}?autoplay=1${mute}&enablejsapi=1`;
        document.getElementById('slideNum').innerText = `ARCHIVE 0${currentIdx + 1}`;
        typeLog();
    }

    function toggleMute() {
        isMuted = !isMuted;
        vFrame.src += "&mute=1"; // Quick mute hack
        document.getElementById('muteBtn').style.color = isMuted ? "#ff4dd2" : "#fff";
    }

    /* RADIO */
    const songData = [
        { name: "Hot Together", file: "music/together.mp3" },
        { name: "Love Is A Long Road", file: "music/long.mp3" },
        { name: "Night", file: "music/night.mp3" },
        { name: "Ocean Breeze", file: "music/ocean.mp3" },
        { name: "Self Control", file: "music/self.mp3" },
        { name: "Atomic", file: "music/tomic.mp3" },
        { name: "Sun Glasses At Night", file: "music/sun.mp3" },
        { name: "All Night Long", file: "music/all.mp3" },
        { name: "Shame", file: "music/shame.mp3" },
        { name: "Vice City", file: "music/vice.mp3" },
        { name: "I Walk This Earth All By Myself", file: "music/earth.mp3" },
        { name: "Owner Of A Lonley Heart", file: "music/heart.mp3" },
        { name: "Tempted", file: "music/tempt.mp3" },
        { name: "Poison Arrow", file: "music/arrow.mp3" },
        { name: "Is It A Crime", file: "music/crime.mp3" },
        { name: "Here We Are", file: "music/are.mp3" },
        { name: "Through The Fire", file: "music/fire.mp3" },
        { name: "Heart Of Mine", file: "music/mine.mp3" },
        { name: "Fly Away", file: "music/fly.mp3" },
        { name: "Ain't Nobody", file: "music/nobody.mp3" },
        { name: "Thinking Of You", file: "music/you.mp3" },
        { name: "Sweet Love", file: "music/love.mp3" },
        { name: "I Still Remember You", file: "music/remember.mp3" },
        { name: "Gamble With My Love", file: "music/gamble.mp3" },
        { name: "Sukiyaki", file: "music/suki.mp3" }
    ];

    const list = document.getElementById('sList');
    songData.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'track';
        d.id = `track-${i}`;
        d.innerText = `${String(i+1).padStart(2, '0')}. ${s.name}`;
        d.onclick = () => {
            document.querySelectorAll('.track').forEach(t=>t.classList.remove('active'));
            d.classList.add('active');
            musicPlayer.src = s.file;
            musicPlayer.play();
        };
        list.appendChild(d);
    });

    musicPlayer.onended = () => {
        let current = parseInt(document.querySelector('.track.active').id.split('-')[1]);
        document.getElementById(`track-${(current + 1) % songData.length}`).click();
    };

    function setVol(v) { musicPlayer.volume = v; }

    /* COUNTDOWN */
    const target = new Date('2026-11-19T00:00:00');
    setInterval(() => {
        const diff = Math.floor((target - new Date())/1000);
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400).toString().padStart(3,'0');
        document.getElementById('h').innerText = Math.floor(diff/3600%24).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor(diff/60%60).toString().padStart(2,'0');
        document.getElementById('s').innerText = (diff%60).toString().padStart(2,'0');
    }, 1000);
</script>
</body>
</html>
