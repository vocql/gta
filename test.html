<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 Themed Snapmatic Phone</title>
    <style>
        /* GTA 6 Theme: Neon sunset vibes */
        @font-face {
            font-family: 'Pricedown'; /* Download from dafont.com */
            src: url('pricedown.woff2') format('woff2'); /* Add font file */
        }
        body {
            background: linear-gradient(to bottom, #FF69B4, #FFA500); /* Pink to orange */
            font-family: 'Pricedown', sans-serif;
            color: #FFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .phone {
            width: 320px;
            height: 640px;
            background: #000;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.5); /* Neon glow */
            position: relative;
            overflow: hidden;
        }
        .home-screen {
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 50px 20px 100px;
            background: url('sunset-palms.jpg') no-repeat center/cover; /* Add a GTA-style background image */
        }
        .app-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .app-icon:hover {
            transform: scale(1.1);
        }
        .app-icon img { /* Use free icons, e.g., from flaticon.com */
            width: 50px;
        }
        /* Snapmatic Modal (hidden by default) */
        #snapmatic {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #video {
            width: 100%;
            height: 70%;
            background: #333; /* Placeholder for camera */
        }
        .controls {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 20px;
        }
        .btn {
            background: #FF69B4;
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Pricedown';
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="home-screen">
            <div class="app-icon" onclick="openSnapmatic()">
                <img src="camera-icon.png" alt="Snapmatic"> <!-- Add icon -->
            </div>
            <!-- Add more icons for other "apps" if wanted -->
        </div>
        <div id="snapmatic">
            <video id="video"></video>
            <div class="controls">
                <button class="btn" onclick="snapPhoto()">Snap</button>
                <button class="btn" onclick="closeSnapmatic()">Back</button>
            </div>
        </div>
    </div>

    <script>
        function openSnapmatic() {
            document.getElementById('snapmatic').style.display = 'flex';
            // Access webcam
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    document.getElementById('video').srcObject = stream;
                    document.getElementById('video').play();
                })
                .catch(err => console.error('Camera access denied:', err));
        }

        function closeSnapmatic() {
            document.getElementById('snapmatic').style.display = 'none';
            const video = document.getElementById('video');
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
        }

        function snapPhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            // Apply GTA-style filter (e.g., sepia)
            canvas.toDataURL('image/png'); // Save or download
            // Example: Download the photo
            const link = document.createElement('a');
            link.download = 'gta6-snap.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
