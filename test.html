<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>

<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; overflow: hidden; background: #000; }

body {
    font-family: 'Exo 2', sans-serif;
    background: 
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)),
        url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 50px;
}

/* MAIN HUD */
.main-hud {
    width: 340px;
    padding: 25px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
}

/* TITLE */
.title { font-size: 30px; font-weight: 900; }
.neon-gta { text-shadow: 0 0 10px #ff4dd2; }
.neon-vi { text-shadow: 0 0 10px #00ffe0; }

.subtitle {
    font-size: 10px;
    letter-spacing: 2px;
    color: #ff4dd2;
    margin-bottom: 15px;
}

/* COUNTDOWN ROW */
.hud-row {
    display: flex;
    gap: 12px;
}

.countdown-wrap {
    flex: 1;
}

.clock-label {
    font-size: 8px;
    opacity: 0.6;
    margin-bottom: 5px;
}

.integrated-clock {
    display: flex;
    gap: 6px;
}

.unit {
    width: 55px;
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 6px;
    border-radius: 6px;
}

.num { font-size: 18px; font-weight: 600; }

/* SIDE HUD */
.side-hud {
    width: 110px;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.side-title {
    font-size: 8px;
    opacity: 0.5;
    margin-bottom: 4px;
    letter-spacing: 2px;
}

.side-btn {
    text-decoration: none;
    font-size: 9px;
    font-weight: 700;
    padding: 6px;
    border-radius: 4px;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.2s;
    position: relative;
}

.side-btn:hover {
    color: #00ffe0;
    border-color: #00ffe0;
    background: rgba(0,255,224,0.08);
}

.side-btn.active {
    color: #ff4dd2;
    border-color: #ff4dd2;
    background: rgba(255,77,210,0.1);
}

.side-btn::before {
    content: "";
    position: absolute;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
    width: 2px;
    height: 60%;
}

.side-btn:hover::before { background: #00ffe0; }
.side-btn.active::before { background: #ff4dd2; }

</style>
</head>

<body>

<section class="main-hud">

    <h1 class="title"><span class="neon-gta">GTA</span> <span class="neon-vi">VI</span></h1>
    <div class="subtitle">PREPARING FOR NOVEMBER 19, 2026</div>

    <!-- COUNTDOWN + SIDE HUD -->
    <div class="hud-row">

        <!-- COUNTDOWN -->
        <div class="countdown-wrap">
            <div class="clock-label">Time Remaining</div>
            <div class="integrated-clock">
                <div class="unit"><div class="num" id="days">000</div><div>DAYS</div></div>
                <div class="unit"><div class="num" id="hours">00</div><div>HRS</div></div>
                <div class="unit"><div class="num" id="minutes">00</div><div>MINS</div></div>
                <div class="unit"><div class="num" id="seconds">00</div><div>SECS</div></div>
            </div>
        </div>

        <!-- RIGHT SIDE HUD NAV -->
        <div class="side-hud">
            <div class="side-title">NAV</div>

            <a href="#" class="side-btn active">HOME</a>
            <a href="map" class="side-btn">MAP</a>
            <a href="characters" class="side-btn">CHARACTERS</a>
            <a href="places" class="side-btn">PLACES</a>
            <a href="screenshots" class="side-btn">SCREENSHOTS</a>
            <a href="trailers" class="side-btn">TRAILERS</a>
        </div>

    </div>

</section>

<script>
/* COUNTDOWN */
const target = new Date('2026-11-19T00:00:00');

function update() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;

    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('minutes').textContent = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('seconds').textContent = (diff%60).toString().padStart(2, '0');
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
