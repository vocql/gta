<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>

<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}

body{
  font-family:'Orbitron',sans-serif;
  background:
    linear-gradient(135deg, rgba(255,77,210,0.15), rgba(0,255,224,0.10)),
    url('gta/jason.jpg') center/cover no-repeat fixed;
  background-blend-mode: overlay;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  background-position:center 40%;
  transition:.3s;
}

/* THEME MODE */
body.neon{
  background:
    linear-gradient(135deg, rgba(255,77,210,0.35), rgba(0,255,224,0.25)),
    url('gta/jason.jpg') center/cover no-repeat fixed;
}

/* BLUR MODE */
body.blur::before{
  content:"";
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  z-index:-1;
}

/* NAV */
header {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(0, 0, 0, 0.25);
}
.nav-btn {
  padding: 9px 17px;
  border-radius: 999px;
  color: #fff;
  text-decoration: none;
  background: rgba(255,255,255,0.08);
}

/* COUNTDOWN */
.countdown-wrap{
  border-radius:20px;
  padding:26px;
  text-align:center;
  background:rgba(0,0,0,0.25);
  border:2px solid #fff;
}

/* BUTTON */
.music-trigger{
  position:fixed;
  bottom:18px;
  left:18px;
  width:42px;
  height:42px;
  border-radius:50%;
  background: rgba(255,77,210,0.25);
  box-shadow: 0 0 18px rgba(255,77,210,0.6);
  cursor:pointer;
}

/* MENU */
.menu-panel{
  position:fixed;
  bottom:70px;
  left:18px;
  width:280px;
  max-height:70vh;
  overflow-y:auto;
  border-radius:18px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding:16px;
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:.25s;
}
.menu-panel.active{
  opacity:1;
  pointer-events:auto;
  transform:translateY(0);
}

.menu-title{font-size:13px;margin:10px 0}

/* SETTINGS UI */
.setting{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  font-size:13px;
}

.toggle{
  width:40px;
  height:20px;
  border-radius:20px;
  background:#555;
  position:relative;
  cursor:pointer;
}
.toggle::after{
  content:"";
  position:absolute;
  width:16px;
  height:16px;
  top:2px;
  left:2px;
  background:#fff;
  border-radius:50%;
  transition:.2s;
}
.toggle.active{
  background:#ff4dd2;
}
.toggle.active::after{
  left:22px;
}

/* VOLUME */
input[type=range]{
  width:100%;
}

/* MUSIC */
.music-item{
  padding:8px;
  margin:4px 0;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  cursor:pointer;
}
.music-item.active{
  background:rgba(255,77,210,0.4);
}
</style>
</head>

<body>

<header>
  <a href="index" class="nav-btn">Home</a>
</header>

<div class="countdown-wrap">
  <h1>Grand Theft Auto VI</h1>
</div>

<div class="music-trigger" id="musicTrigger"></div>

<div class="menu-panel" id="menuPanel">

  <div class="menu-title">SETTINGS</div>

  <div class="setting">
    Theme
    <div class="toggle" id="themeToggle"></div>
  </div>

  <div class="setting">
    Blur
    <div class="toggle" id="blurToggle"></div>
  </div>

  <div class="setting">
    Loop
    <div class="toggle" id="loopToggle"></div>
  </div>

  <div class="setting">
    Volume
  </div>
  <input type="range" id="volume" min="0" max="1" step="0.01">

  <div class="menu-title">MUSIC</div>

  <div class="music-item" data-song="music/together.mp3">Hot Together</div>
  <div class="music-item" data-song="music/long.mp3">Love Is A Long Road</div>
  <div class="music-item" data-song="music/night.mp3">Night</div>
  <div class="music-item" data-song="music/ocean.mp3">Ocean Breeze</div>
  <div class="music-item" data-song="music/self.mp3">Self Control</div>

</div>

<audio id="musicPlayer"></audio>

<script>
const trigger = document.getElementById('musicTrigger');
const panel = document.getElementById('menuPanel');
trigger.onclick = () => panel.classList.toggle('active');

/* PLAYER */
const player = document.getElementById('musicPlayer');
document.querySelectorAll('.music-item').forEach(item=>{
  item.onclick=()=>{
    document.querySelectorAll('.music-item').forEach(i=>i.classList.remove('active'));
    item.classList.add('active');
    player.src=item.dataset.song;
    player.play();
  };
});

/* SETTINGS */
const themeToggle=document.getElementById('themeToggle');
themeToggle.onclick=()=>{
  themeToggle.classList.toggle('active');
  document.body.classList.toggle('neon');
};

const blurToggle=document.getElementById('blurToggle');
blurToggle.onclick=()=>{
  blurToggle.classList.toggle('active');
  document.body.classList.toggle('blur');
};

const loopToggle=document.getElementById('loopToggle');
loopToggle.onclick=()=>{
  loopToggle.classList.toggle('active');
  player.loop=!player.loop;
};

document.getElementById('volume').oninput=(e)=>{
  player.volume=e.target.value;
};
</script>

</body>
</html>
