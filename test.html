<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Home</title>

    <link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; }

        body {
            font-family: 'Exo 2', sans-serif;
            font-weight: 300;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)),
                url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: background-position 0.15s ease-out;
            padding-left: 50px;
        }

        /* ATMOSPHERIC SCANLINES */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            z-index: 100; pointer-events: none; opacity: 0.4;
        }

        /* ================= ERROR MENU ================= */
        #errorOverlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px); z-index: 1000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }
        .error-box {
            border: 1px solid #ff4dd2; padding: 40px; border-radius: 20px;
            background: rgba(255, 77, 210, 0.05); box-shadow: 0 0 30px rgba(255, 77, 210, 0.2);
        }
        .error-title { font-size: 40px; font-weight: 900; color: #ff4dd2; text-shadow: 0 0 10px #ff4dd2; margin-bottom: 10px; }
        .error-msg { font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: #fff; opacity: 0.8; margin-bottom: 30px; }
        .close-btn { 
            padding: 10px 30px; border: 1px solid #00ffe0; color: #00ffe0; background: transparent; 
            cursor: pointer; font-family: 'Exo 2'; font-weight: 900; text-transform: uppercase; border-radius: 5px;
        }

        /* ================= NAVBAR (Nudged up) ================= */
        header {
            position: fixed; top: 10px; right: 50px; z-index: 150;
            display: flex; gap: 6px; padding: 4px;
            border-radius: 999px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .nav-btn {
            padding: 8px 16px; border-radius: 999px; color: #fff;
            font-size: 10px; font-weight: 600; text-decoration: none;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.12); border-color: #00ffe0; }
        .nav-btn.active { border-color: #00ffe0; color: #00ffe0; background: rgba(0, 255, 224, 0.05); }

        /* ================= MAIN HUD ================= */
        .main-hud {
            position: relative; z-index: 10;
            width: 320px; height: auto; height: 85vh;
            display: flex; flex-direction: column; gap: 15px; padding: 30px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(2px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6); transform-style: preserve-3d;
        }

        .hud-header { text-align: left; }
        .title { font-size: 32px; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 2px; }
        .neon-gta { text-shadow: 0 0 5px #ff4dd2, 0 0 10px #ff4dd2; color: #fff; }
        .neon-vi { text-shadow: 0 0 5px #00ffe0, 0 0 10px #00ffe0; color: #fff; }
        .subtitle { font-size: 10px; letter-spacing: 2px; color: #ff4dd2; margin-bottom: 10px; font-weight: 600; }

        .clock-label { font-size: 8px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; color: #fff; }
        .integrated-clock { display: flex; gap: 8px; justify-content: flex-start; margin-bottom: 15px;}
        .unit { padding: 8px 0; border-radius: 6px; background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(255, 255, 255, 0.03); width: 60px; text-align: center;}
        .num { font-size: 20px; font-weight: 600; color: #fff; }
        .label { font-size: 7px; opacity: 0.5; font-weight: 900; margin-top: 2px; }

        /* ================= RADIO SUITE ================= */
        .integrated-radio { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 15px; }
        .radio-header { font-size: 9px; opacity: 0.5; text-transform: uppercase; color: #fff; letter-spacing: 2px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        
        .shuffle-btn { 
            background: rgba(0, 255, 224, 0.1); border: 1px solid rgba(0, 255, 224, 0.3); color: #00ffe0; 
            padding: 4px 10px; border-radius: 4px; font-size: 8px; font-weight: 900; cursor: pointer; transition: 0.2s;
        }
        .shuffle-btn:hover { background: rgba(0, 255, 224, 0.2); border-color: #00ffe0; }
        
        .vol-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .vol-wrap span { font-size: 10px; opacity: 0.5; }
        input[type=range] { flex: 1; accent-color: #ff4dd2; height: 3px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 5px; appearance: none; }

        .integrated-song-list { overflow-y: auto; flex: 1; margin-top: 5px; }
        .track { padding: 10px 12px; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; color: rgba(255,255,255,0.6); transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .track:hover { background: rgba(255, 77, 210, 0.08); color: #ff4dd2; }
        .track.active-song { color: #00ffe0; background: rgba(0, 255, 224, 0.08); border-left: 2px solid #00ffe0; font-weight: 900; }

        .integrated-song-list::-webkit-scrollbar { width: 3px; }
        .integrated-song-list::-webkit-scrollbar-thumb { background: #ff4dd2; border-radius: 10px; }
    </style>
</head>

<body>

<div id="errorOverlay">
    <div class="error-box">
        <div class="error-title">SYSTEM ERROR</div>
        <div class="error-msg">ACCESS DENIED: CONTENT COMING SOON</div>
        <button class="close-btn" onclick="closeError()">Return to Home</button>
    </div>
</div>

<header>
    <a href="index.html" class="nav-btn active">Home</a>
    <a href="map.html" class="nav-btn">Map</a>
    <a href="characters.html" class="nav-btn">Characters</a>
    <a href="#" class="nav-btn" onclick="triggerError()">Places</a>
    <a href="#" class="nav-btn" onclick="triggerError()">Screenshots</a>
    <a href="#" class="nav-btn" onclick="triggerError()">Trailers</a>
</header>

<section class="main-hud" id="mainCard">
    <div class="hud-header">
        <h1 class="title"><span class="neon-gta">GTA</span> <span class="neon-vi">VI</span></h1>
        <div class="subtitle">PREPARING FOR NOVEMBER 19, 2026</div>
    </div>

    <div>
        <div class="clock-label">Time Remaining</div>
        <div class="integrated-clock">
            <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
            <div class="unit"><div class="num" id="hours">00</div><div class="label">HRS</div></div>
            <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINS</div></div>
            <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECS</div></div>
        </div>
    </div>

    <div class="integrated-radio">
        <div class="radio-header">
            <span>VICE CITY RADIO</span>
            <button class="shuffle-btn" id="shuffleBtn">SHUFFLE</button>
        </div>
        <div class="vol-wrap">
            <span>VOL</span>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
        </div>
        <div class="integrated-song-list" id="songList"></div>
    </div>
</section>

<audio id="musicPlayer"></audio>

<script>
function triggerError() { document.getElementById('errorOverlay').style.display = 'flex'; }
function closeError() { document.getElementById('errorOverlay').style.display = 'none'; }

/* COUNTDOWN */
const target = new Date('2026-11-19T00:00:00');
function update() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;
    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('minutes').textContent = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('seconds').textContent = (diff%60).toString().padStart(2, '0');
}
setInterval(update, 1000); update();

/* PARALLAX */
const card = document.getElementById('mainCard');
document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 80;
    const y = (window.innerHeight / 2 - e.pageY) / 80;
    document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(35% + ${y}px)`;
    card.style.transform = `perspective(1000px) rotateX(${(window.innerHeight/2 - e.pageY)/70}deg) rotateY(${(e.pageX - window.innerWidth/2)/70}deg)`;
});

/* RADIO ENGINE */
const songs = [
    {n:"Hot Together", s:"music/together.mp3"}, {n:"Love Is A Long Road", s:"music/long.mp3"}, {n:"Night", s:"music/night.mp3"}, 
    {n:"Ocean Breeze", s:"music/ocean.mp3"}, {n:"Self Control", s:"music/self.mp3"}, {n:"Atomic", s:"music/tomic.mp3"}, 
    {n:"Sun Glasses At Night", s:"music/sun.mp3"}, {n:"All Night Long", s:"music/all.mp3"}, {n:"Shame", s:"music/shame.mp3"}, 
    {n:"Vice City", s:"music/vice.mp3"}, {n:"I Walk This Earth All By Myself", s:"music/earth.mp3"}, {n:"Owner Of A Lonley Heart", s:"music/heart.mp3"},
    {n:"Tempted", s:"music/tempt.mp3"}, {n:"Poison Arrow", s:"music/arrow.mp3"}, {n:"Is It A Crime", s:"music/crime.mp3"}, 
    {n:"Here We Are", s:"music/are.mp3"}, {n:"Through The Fire", s:"music/fire.mp3"}, {n:"Heart Of Mine", s:"music/mine.mp3"}, 
    {n:"Fly Away", s:"music/fly.mp3"}, {n:"Ain't Nobody", s:"music/nobody.mp3"}, {n:"Thinking Of You", s:"music/you.mp3"}, 
    {n:"Sweet Love", s:"music/love.mp3"}, {n:"I Still Remember You", s:"music/remember.mp3"}, {n:"Gamble With My Love", s:"music/gamble.mp3"}, 
    {n:"Sukiyaki", s:"music/suki.mp3"}
];

const player = document.getElementById('musicPlayer'), list = document.getElementById('songList');

songs.forEach((song, idx) => {
    const div = document.createElement('div'); 
    div.className = 'track'; 
    div.innerText = `${String(idx + 1).padStart(2, '0')}. ${song.n}`;
    div.onclick = () => play(song.s, div); 
    list.appendChild(div);
});

document.getElementById('volSlider').oninput = (e) => player.volume = e.target.value;
document.getElementById('shuffleBtn').onclick = () => {
    const r = Math.floor(Math.random()*songs.length);
    const tracks = document.querySelectorAll('.track');
    play(songs[r].s, tracks[r]);
};

function play(src, el) {
    if (player.src.includes(src) && !player.paused) { 
        player.pause(); 
        el.classList.remove('active-song');
    } else {
        document.querySelectorAll('.track').forEach(t => t.classList.remove('active-song'));
        player.src = src; player.play(); el.classList.add('active-song');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}
</script>
</body>
</html>
