<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>

<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; overflow: hidden; background: #000; }

body {
    font-family: 'Exo 2', sans-serif;
    background: 
        linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)),
        url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding-left: 50px;
}

/* MAIN HUD (LEFT) */
.main-hud {
    width: 320px;
    padding: 30px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
}

/* TITLE */
.title { font-size: 32px; font-weight: 900; letter-spacing: 4px; }
.neon-gta { text-shadow: 0 0 15px #ff4dd2; }
.neon-vi { text-shadow: 0 0 15px #00ffe0; }

.subtitle {
    font-size: 10px;
    letter-spacing: 2px;
    color: #ff4dd2;
    margin-bottom: 15px;
}

/* COUNTDOWN */
.clock-label {
    font-size: 8px;
    opacity: 0.6;
    margin-bottom: 5px;
}

.integrated-clock {
    display: flex;
    gap: 8px;
}

.unit {
    width: 60px;
    text-align: center;
    background: rgba(0,0,0,0.45);
    padding: 8px 0;
    border-radius: 6px;
}

.num { font-size: 20px; font-weight: 600; }

/* RIGHT FLOATING HUD */
.right-hud {
    position: fixed;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);

    width: 170px;
    padding: 18px;

    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);

    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;

    display: flex;
    flex-direction: column;
    gap: 10px;

    z-index: 100;
    box-shadow: 0 15px 50px rgba(0,0,0,0.6);
}

/* TITLE */
.right-title {
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.5;
    margin-bottom: 8px;
}

/* BUTTONS */
.right-btn {
    text-decoration: none;
    font-size: 11px;
    font-weight: 700;
    padding: 10px 12px;
    border-radius: 6px;

    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);

    transition: 0.2s;
    position: relative;
}

/* HOVER */
.right-btn:hover {
    color: #00ffe0;
    border-color: #00ffe0;
    background: rgba(0,255,224,0.08);
}

/* ACTIVE */
.right-btn.active {
    color: #ff4dd2;
    border-color: #ff4dd2;
    background: rgba(255,77,210,0.1);
}

/* LEFT GLOW BAR */
.right-btn::before {
    content: "";
    position: absolute;
    left: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60%;
    background: transparent;
    transition: 0.2s;
}

.right-btn:hover::before { background: #00ffe0; }
.right-btn.active::before { background: #ff4dd2; }

</style>
</head>

<body>

<!-- LEFT HUD -->
<section class="main-hud">

    <h1 class="title"><span class="neon-gta">GTA</span> <span class="neon-vi">VI</span></h1>
    <div class="subtitle">PREPARING FOR NOVEMBER 19, 2026</div>

    <div>
        <div class="clock-label">Time Remaining</div>
        <div class="integrated-clock">
            <div class="unit"><div class="num" id="days">000</div><div>DAYS</div></div>
            <div class="unit"><div class="num" id="hours">00</div><div>HRS</div></div>
            <div class="unit"><div class="num" id="minutes">00</div><div>MINS</div></div>
            <div class="unit"><div class="num" id="seconds">00</div><div>SECS</div></div>
        </div>
    </div>

</section>

<!-- RIGHT SIDE HUD -->
<div class="right-hud">
    <div class="right-title">NAVIGATION</div>

    <a href="#" class="right-btn active">HOME</a>
    <a href="map" class="right-btn">MAP</a>
    <a href="characters" class="right-btn">CHARACTERS</a>
    <a href="places" class="right-btn">PLACES</a>
    <a href="screenshots" class="right-btn">SCREENSHOTS</a>
    <a href="trailers" class="right-btn">TRAILERS</a>
</div>

<script>
/* COUNTDOWN */
const target = new Date('2026-11-19T00:00:00');

function update() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;

    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('minutes').textContent = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('seconds').textContent = (diff%60).toString().padStart(2, '0');
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
