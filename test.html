<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Home</title>
    <link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.3)),
                url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            transition: background-position 0.15s ease-out;
            padding-left: 50px;
        }

        /* ATMOSPHERIC SCANLINES */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            z-index: 100; pointer-events: none; opacity: 0.4;
        }

        /* NAVBAR */
        header {
            position: fixed; top: 20px; right: 50px; z-index: 150;
            display: flex; gap: 8px; padding: 6px;
            border-radius: 999px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-btn {
            padding: 10px 18px; border-radius: 999px; color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px; font-weight: 700; text-decoration: none;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s; letter-spacing: 1px; text-transform: uppercase;
        }
        .nav-btn:hover, .nav-btn.active { background: #00ffe0; color: #000; border-color: #00ffe0; transform: scale(1.05); }

        /* MAIN HUD */
        .main-hud {
            position: relative; z-index: 10;
            width: 340px;
            max-height: 90vh;
            display: flex; flex-direction: column;
            padding: 35px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
        }

        .hud-header { margin-bottom: 25px; }
        .title { font-family: 'Orbitron', sans-serif; font-size: 38px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-style: italic; }
        .neon-gta { color: #ff4dd2; text-shadow: 0 0 15px #ff4dd2; }
        .neon-vi { color: #00ffe0; text-shadow: 0 0 15px #00ffe0; }
        .subtitle { font-family: 'Orbitron'; font-size: 8px; letter-spacing: 3px; color: #ff4dd2; margin-top: 5px; opacity: 0.8; }

        /* COUNTDOWN NEON */
        .integrated-clock { display: flex; gap: 10px; margin-bottom: 25px; }
        .unit { flex: 1; padding: 12px 0; background: rgba(255,255,255,0.03); border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .num { font-family: 'Orbitron'; font-size: 18px; font-weight: 700; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .label { font-family: 'Orbitron'; font-size: 7px; opacity: 0.5; margin-top: 4px; letter-spacing: 1px; }

        /* RADIO SYSTEM */
        .integrated-radio { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px; }
        .radio-header { 
            font-family: 'Orbitron'; font-size: 9px; color: #00ffe0; letter-spacing: 2px; 
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .shuffle-btn { 
            background: rgba(0, 255, 224, 0.1); border: 1px solid #00ffe0; color: #00ffe0; 
            padding: 5px 12px; border-radius: 5px; font-size: 8px; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron'; transition: 0.3s;
        }
        .shuffle-btn:hover { background: #00ffe0; color: #000; box-shadow: 0 0 15px #00ffe0; }

        .vol-wrap { display: flex; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        input[type=range] { 
            width: 100%; accent-color: #ff4dd2; height: 4px; cursor: pointer; 
            background: rgba(255,255,255,0.1); border-radius: 5px; appearance: none;
        }

        .integrated-song-list { overflow-y: auto; flex: 1; padding-right: 5px; }
        .track { 
            padding: 12px; border-radius: 8px; font-size: 11px; cursor: pointer; 
            color: rgba(255,255,255,0.5); transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track:hover { background: rgba(0, 255, 224, 0.05); color: #00ffe0; }
        .track.active-song { color: #ff4dd2; background: rgba(255, 77, 210, 0.1); border-left: 3px solid #ff4dd2; font-weight: 700; }

        .integrated-song-list::-webkit-scrollbar { width: 3px; }
        .integrated-song-list::-webkit-scrollbar-thumb { background: #ff4dd2; border-radius: 10px; }
    </style>
</head>

<body>

<header>
    <a href="#" class="nav-btn active">Home</a>
    <a href="map" class="nav-btn">Map</a>
    <a href="characters" class="nav-btn">Characters</a>
    <a href="places" class="nav-btn">Places</a>
    <a href="screenshots" class="nav-btn">Screenshots</a>
    <a href="trailers" class="nav-btn">Trailers</a>
</header>

<section class="main-hud" id="mainCard">
    <div class="hud-header">
        <h1 class="title"><span class="neon-gta">GTA</span> <span class="neon-vi">VI</span></h1>
        <div class="subtitle">LAUNCH PROTOCOL: NOV 19, 2026</div>
    </div>

    <div class="integrated-clock">
        <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
        <div class="unit"><div class="num" id="hours">00</div><div class="label">HRS</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINS</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECS</div></div>
    </div>

    <div class="integrated-radio">
        <div class="radio-header">
            <span>VICE CITY RADIO</span>
            <button class="shuffle-btn" id="shuffleBtn">SHUFFLE</button>
        </div>
        <div class="vol-wrap"><input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7"></div>
        <div class="integrated-song-list" id="songList"></div>
    </div>
</section>

<audio id="musicPlayer"></audio>

<script>
const target = new Date('2026-11-19T00:00:00');
function update() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;
    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = Math.floor(diff/3600%24).toString().padStart(2, '0');
    document.getElementById('minutes').textContent = Math.floor(diff/60%60).toString().padStart(2, '0');
    document.getElementById('seconds').textContent = (diff%60).toString().padStart(2, '0');
}
setInterval(update, 1000); update();

const card = document.getElementById('mainCard');
document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 90;
    const y = (window.innerHeight / 2 - e.pageY) / 90;
    document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(35% + ${y}px)`;
    card.style.transform = `perspective(1000px) rotateX(${(window.innerHeight/2 - e.pageY)/80}deg) rotateY(${(e.pageX - window.innerWidth/2)/80}deg)`;
});

const songs = [
    {n:"Hot Together", s:"music/together.mp3"}, {n:"Love Is A Long Road", s:"music/long.mp3"}, {n:"Night", s:"music/night.mp3"}, 
    {n:"Ocean Breeze", s:"music/ocean.mp3"}, {n:"Self Control", s:"music/self.mp3"}, {n:"Atomic", s:"music/tomic.mp3"}, 
    {n:"Sun Glasses At Night", s:"music/sun.mp3"}, {n:"All Night Long", s:"music/all.mp3"}, {n:"Shame", s:"music/shame.mp3"}, 
    {n:"Vice City", s:"music/vice.mp3"}, {n:"I Walk This Earth All By Myself", s:"music/earth.mp3"}, {n:"Owner Of A Lonley Heart", s:"music/heart.mp3"},
    {n:"Tempted", s:"music/tempt.mp3"}, {n:"Poison Arrow", s:"music/arrow.mp3"}, {n:"Is It A Crime", s:"music/crime.mp3"}, 
    {n:"Here We Are", s:"music/are.mp3"}, {n:"Through The Fire", s:"music/fire.mp3"}, {n:"Heart Of Mine", s:"music/mine.mp3"}, 
    {n:"Fly Away", s:"music/fly.mp3"}, {n:"Ain't Nobody", s:"music/nobody.mp3"}, {n:"Thinking Of You", s:"music/you.mp3"}, 
    {n:"Sweet Love", s:"music/love.mp3"}, {n:"I Still Remember You", s:"music/remember.mp3"}, {n:"Gamble With My Love", s:"music/gamble.mp3"}, 
    {n:"Sukiyaki", s:"music/suki.mp3"}
];

const player = document.getElementById('musicPlayer'), list = document.getElementById('songList');

songs.forEach(song => {
    const div = document.createElement('div'); div.className = 'track'; div.innerText = song.n.toUpperCase();
    div.onclick = () => play(song.s, div); list.appendChild(div);
});

document.getElementById('volSlider').oninput = (e) => player.volume = e.target.value;
document.getElementById('shuffleBtn').onclick = () => {
    const r = Math.floor(Math.random()*songs.length);
    play(songs[r].s, document.querySelectorAll('.track')[r]);
};

function play(src, el) {
    if (player.src.includes(src) && !player.paused) { 
        player.pause(); 
    } else {
        document.querySelectorAll('.track').forEach(t => t.classList.remove('active-song'));
        player.src = src; player.play(); el.classList.add('active-song');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}
</script>
</body>
</html>
