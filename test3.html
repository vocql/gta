<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Leonida OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100vh; overflow: hidden; background: #050505; color: #fff; font-family: 'Exo 2', sans-serif; }

        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.4)), url('gta/jason.jpg') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .container {
            display: grid; grid-template-columns: 320px 450px 1fr; gap: 20px;
            width: 100%; height: 90vh; max-width: 1850px; z-index: 10;
        }

        .panel {
            background: rgba(0, 0, 0, 0.88); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; backdrop-filter: blur(30px); display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* --- NEON HUD --- */
        .hud-top { padding: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .gta-logo { font-size: 32px; font-weight: 900; letter-spacing: 4px; margin-bottom: 15px; text-align: center; }
        .neon-p { color: #ff4dd2; text-shadow: 0 0 15px #ff4dd2; animation: neon-pulse 2s infinite alternate; }
        .neon-b { color: #00ffe0; text-shadow: 0 0 15px #00ffe0; animation: neon-pulse 2s infinite alternate-reverse; }
        
        @keyframes neon-pulse {
            from { opacity: 0.8; text-shadow: 0 0 10px currentColor; }
            to { opacity: 1; text-shadow: 0 0 20px currentColor, 0 0 30px currentColor; }
        }

        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .t-box { background: rgba(255,255,255,0.03); padding: 12px 0; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .t-num { font-size: 22px; font-weight: 900; color: #00ffe0; display: block; }
        .t-lab { font-size: 8px; font-weight: 900; color: #ff4dd2; text-transform: uppercase; }

        /* --- RADIO --- */
        .radio-wrap { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .vol-slider { width: 100%; accent-color: #ff4dd2; margin-bottom: 15px; cursor: pointer; height: 4px; appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .song-list { overflow-y: auto; flex: 1; }
        .track { padding: 12px; font-size: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); opacity: 0.5; transition: 0.2s; }
        .track.active { opacity: 1; color: #00ffe0; background: rgba(0, 255, 224, 0.05); border-left: 3px solid #ff4dd2; }

        /* --- CINEMA TRAILER PANEL --- */
        .trailer-section { position: relative; width: 100%; padding-top: 56.25%; background: #000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .vid-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .slider-controls {
            display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .slide-btn, .fs-btn { 
            background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; 
            padding: 5px 12px; cursor: pointer; border-radius: 4px; font-size: 10px; font-weight: 900;
        }
        .slide-btn:hover, .fs-btn:hover { border-color: #ff4dd2; color: #ff4dd2; background: rgba(255,77,210,0.05); }
        .slide-counter { font-size: 10px; font-weight: 900; color: #00ffe0; letter-spacing: 2px; }

        .intel-area { flex: 1; padding: 25px; }
        .status-log { font-family: monospace; font-size: 11px; color: #00ffe0; opacity: 0.7; }
        .status-line { margin-bottom: 8px; border-left: 2px solid #ff4dd2; padding-left: 10px; }

        /* --- MAP PANEL --- */
        .map-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="hud-top">
            <div class="gta-logo"><span class="neon-p">GTA</span> <span class="neon-b">VI</span></div>
            <div class="timer">
                <div class="t-box"><span class="t-num" id="d">000</span><span class="t-lab">Days</span></div>
                <div class="t-box"><span class="t-num" id="h">00</span><span class="t-lab">Hrs</span></div>
                <div class="t-box"><span class="t-num" id="m">00</span><span class="t-lab">Mins</span></div>
                <div class="t-box"><span class="t-num" id="s">00</span><span class="t-lab">Secs</span></div>
            </div>
        </div>
        <div class="radio-wrap">
            <input type="range" class="vol-slider" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
            <div class="song-list" id="sList"></div>
        </div>
    </div>

    <div class="panel" id="cinemaPanel">
        <div class="slider-controls">
            <button class="slide-btn" onclick="changeTrailer(-1)">PREV</button>
            <div class="slide-counter" id="slideNum">1 / 2</div>
            <button class="slide-btn" onclick="changeTrailer(1)">NEXT</button>
            <button class="fs-btn" onclick="toggleFS()">FULLSCREEN</button>
        </div>
        <div class="trailer-section" id="videoContainer">
            <iframe id="vFrame" class="vid-frame" src="https://www.youtube.com/embed/QdBZY2fkU-0" allowfullscreen></iframe>
        </div>
        <div class="intel-area">
            <div class="status-log">
                <div class="status-line">> ARCHIVE_LOADED: SUCCESS</div>
                <div class="status-line">> RESOLUTION: 4K_ULTRA</div>
                <div class="status-line">> STATUS: MONITORING_LEONIDA</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <iframe src="https://map.stateofleonida.net/" class="map-frame" scrolling="no"></iframe>
    </div>
</div>

<audio id="player"></audio>

<script>
    const musicPlayer = document.getElementById('player');
    const trailers = ["QdBZY2fkU-0", "VQRLujxTm3c"];
    let currentIdx = 0;

    /* TRAILER LOGIC */
    function changeTrailer(dir) {
        currentIdx += dir;
        if (currentIdx < 0) currentIdx = trailers.length - 1;
        if (currentIdx >= trailers.length) currentIdx = 0;
        document.getElementById('vFrame').src = `https://www.youtube.com/embed/${trailers[currentIdx]}?autoplay=1`;
        document.getElementById('slideNum').innerText = `${currentIdx + 1} / ${trailers.length}`;
    }

    /* FULLSCREEN LOGIC */
    function toggleFS() {
        const container = document.getElementById('videoContainer');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {
                alert(`Error: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    /* RADIO LOGIC */
    const songData = [
        { name: "Hot Together", file: "music/together.mp3" },
        { name: "Love Is A Long Road", file: "music/long.mp3" },
        { name: "Night", file: "music/night.mp3" },
        { name: "Ocean Breeze", file: "music/ocean.mp3" },
        { name: "Self Control", file: "music/self.mp3" },
        { name: "Atomic", file: "music/tomic.mp3" },
        { name: "Sun Glasses At Night", file: "music/sun.mp3" },
        { name: "All Night Long", file: "music/all.mp3" },
        { name: "Shame", file: "music/shame.mp3" },
        { name: "Vice City", file: "music/vice.mp3" },
        { name: "I Walk This Earth All By Myself", file: "music/earth.mp3" },
        { name: "Owner Of A Lonley Heart", file: "music/heart.mp3" },
        { name: "Tempted", file: "music/tempt.mp3" },
        { name: "Poison Arrow", file: "music/arrow.mp3" },
        { name: "Is It A Crime", file: "music/crime.mp3" },
        { name: "Here We Are", file: "music/are.mp3" },
        { name: "Through The Fire", file: "music/fire.mp3" },
        { name: "Heart Of Mine", file: "music/mine.mp3" },
        { name: "Fly Away", file: "music/fly.mp3" },
        { name: "Ain't Nobody", file: "music/nobody.mp3" },
        { name: "Thinking Of You", file: "music/you.mp3" },
        { name: "Sweet Love", file: "music/love.mp3" },
        { name: "I Still Remember You", file: "music/remember.mp3" },
        { name: "Gamble With My Love", file: "music/gamble.mp3" },
        { name: "Sukiyaki", file: "music/suki.mp3" }
    ];

    const list = document.getElementById('sList');
    songData.forEach((s, i) => {
        const d = document.createElement('div');
        d.className = 'track';
        d.id = `track-${i}`;
        d.innerText = `${String(i+1).padStart(2, '0')}. ${s.name}`;
        d.onclick = () => {
            document.querySelectorAll('.track').forEach(t=>t.classList.remove('active'));
            d.classList.add('active');
            musicPlayer.src = s.file;
            musicPlayer.play();
        };
        list.appendChild(d);
    });

    musicPlayer.onended = () => {
        let current = parseInt(document.querySelector('.track.active').id.split('-')[1]);
        let next = (current + 1) % songData.length;
        document.getElementById(`track-${next}`).click();
    };

    function setVol(v) { musicPlayer.volume = v; }

    /* COUNTDOWN */
    const target = new Date('2026-11-19T00:00:00');
    setInterval(() => {
        const diff = Math.floor((target - new Date())/1000);
        if(diff < 0) return;
        document.getElementById('d').innerText = Math.floor(diff/86400).toString().padStart(3,'0');
        document.getElementById('h').innerText = Math.floor(diff/3600%24).toString().padStart(2,'0');
        document.getElementById('m').innerText = Math.floor(diff/60%60).toString().padStart(2,'0');
        document.getElementById('s').innerText = (diff%60).toString().padStart(2,'0');
    }, 1000);
</script>
</body>
</html>
