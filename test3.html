<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VI | Home</title>

    <link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html, body { height: 100%; overflow: hidden; background: #000; }

        body {
            font-family: 'Orbitron', sans-serif;
            background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.2)),
                url('gta/jason.jpg') center 35%/115% 115% no-repeat fixed;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-position 0.15s ease-out;
        }

        /* ATMOSPHERIC SCANLINES */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            z-index: 100; pointer-events: none; opacity: 0.4;
        }

        /* ================= NAVBAR ================= */
        header {
            position: fixed; top: 20px; left: 30px; z-index: 150;
            display: flex; gap: 10px; padding: 8px 14px;
            border-radius: 999px; background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-btn {
            padding: 8px 16px; border-radius: 999px; color: #fff;
            font-size: 11px; font-weight: 700; text-decoration: none;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s; letter-spacing: 1px;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #00ffe0; transform: translateY(-2px); }

        /* ================= COMPACT COUNTDOWN ================= */
        .countdown-wrap {
            position: relative; z-index: 10;
            backdrop-filter: blur(1px) saturate(130%);
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 25px 35px;
            text-align: center; width: auto; min-width: 450px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
        }
        .title { 
            font-size: 28px; font-weight: 900; letter-spacing: 4px;
            text-shadow: 2px 2px 0px #ff4dd2, -1px -1px 0px #00ffe0;
            margin-bottom: 2px;
        }
        .subtitle { font-size: 10px; letter-spacing: 2px; color: #00ffe0; margin-bottom: 20px; font-weight: 700; }
        .clock { display: flex; gap: 12px; justify-content: center; }
        .unit { flex: 1; padding: 12px 5px; border-radius: 10px; background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(255, 255, 255, 0.05); }
        .num { font-size: 26px; font-weight: 900; color: #fff; }
        .label { font-size: 8px; opacity: 0.6; margin-top: 4px; letter-spacing: 1px; }

        /* ================= BUBBLE PLAYER (Top Right) ================= */
        .player-container { position: fixed; top: 20px; right: 30px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; }
        .music-bubble {
            width: 50px; height: 50px; background: rgba(255, 77, 210, 0.85);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 77, 210, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .music-bubble:hover { transform: scale(1.1); background: #ff4dd2; }
        .music-bubble svg { fill: white; width: 22px; transition: 0.5s; }
        .music-bubble.playing svg { animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .music-drawer {
            margin-top: 15px; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; width: 280px; max-height: 450px;
            display: flex; flex-direction: column; opacity: 0; pointer-events: none;
            transform: translateY(-15px); transition: 0.3s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .music-drawer.active { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .drawer-header { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; gap: 10px; }
        .top-ctrl { display: flex; justify-content: space-between; align-items: center; }
        .shuffle-btn {
            background: rgba(0, 255, 224, 0.15); border: 1px solid #00ffe0; color: #00ffe0;
            padding: 5px 10px; border-radius: 6px; font-size: 9px; font-weight: 900; cursor: pointer;
        }
        .shuffle-btn:hover { background: #00ffe0; color: #000; }
        .vol-wrap { display: flex; align-items: center; gap: 8px; }
        input[type=range] { flex: 1; accent-color: #00ffe0; height: 3px; cursor: pointer; }

        .song-list { overflow-y: auto; flex: 1; padding: 5px; }
        .track {
            padding: 10px 15px; border-radius: 8px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .track:hover { background: rgba(0, 255, 224, 0.1); color: #00ffe0; }
        .track.active-song { color: #ff4dd2; background: rgba(255, 77, 210, 0.1); border-left: 3px solid #ff4dd2; }

        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: #00ffe0; border-radius: 10px; }
    </style>
</head>

<body>

<header>
    <a href="index" class="nav-btn active">Home</a>
    <a href="map" class="nav-btn">Map</a>
    <a href="characters" class="nav-btn">Characters</a>
    <a href="places" class="nav-btn">Places</a>
    <a href="screenshots" class="nav-btn">Screenshots</a>
    <a href="trailers" class="nav-btn">Trailers</a>
</header>

<section class="countdown-wrap" id="mainCard">
    <h1 class="title">GTA VI</h1>
    <div class="subtitle">PREPARING FOR NOVEMBER 19, 2026</div>
    <div class="clock">
        <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
        <div class="unit"><div class="num" id="hours">00</div><div class="label">HRS</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINS</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECS</div></div>
    </div>
</section>

<div class="player-container">
    <div class="music-bubble" id="musicBubble">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
    </div>
    <div class="music-drawer" id="musicDrawer">
        <div class="drawer-header">
            <div class="top-ctrl">
                <span style="font-size: 9px; opacity: 0.5; letter-spacing: 1px;">RADIO</span>
                <button class="shuffle-btn" id="shuffleBtn">Shuffle</button>
            </div>
            <div class="vol-wrap">
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>
        <div class="song-list" id="songList"></div>
    </div>
</div>

<audio id="musicPlayer"></audio>

<script>
/* ===== COUNTDOWN ===== */
const target = new Date('2026-11-19T00:00:00');
const pad = (n) => n.toString().padStart(2, '0');
function update() {
    const diff = Math.floor((target - new Date())/1000);
    if(diff <= 0) return;
    document.getElementById('days').textContent = Math.floor(diff/86400).toString().padStart(3, '0');
    document.getElementById('hours').textContent = pad(Math.floor(diff/3600%24));
    document.getElementById('minutes').textContent = pad(Math.floor(diff/60%60));
    document.getElementById('seconds').textContent = pad(diff%60);
}
setInterval(update, 1000); update();

/* ===== PARALLAX ===== */
const card = document.getElementById('mainCard');
document.addEventListener('mousemove', (e) => {
    const x = (window.innerWidth / 2 - e.pageX) / 70;
    const y = (window.innerHeight / 2 - e.pageY) / 70;
    document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(35% + ${y}px)`;
    card.style.transform = `rotateX(${(window.innerHeight / 2 - e.pageY) / 40}deg) rotateY(${(e.pageX - window.innerWidth / 2) / 40}deg)`;
});

/* ===== MUSIC ENGINE ===== */
const songs = [
    {n:"Hot Together", s:"music/together.mp3"}, {n:"Love Is A Long Road", s:"music/long.mp3"}, {n:"Night", s:"music/night.mp3"}, 
    {n:"Ocean Breeze", s:"music/ocean.mp3"}, {n:"Self Control", s:"music/self.mp3"}, {n:"Atomic", s:"music/tomic.mp3"}, 
    {n:"Sun Glasses At Night", s:"music/sun.mp3"}, {n:"All Night Long", s:"music/all.mp3"}, {n:"Shame", s:"music/shame.mp3"}, 
    {n:"Vice City", s:"music/vice.mp3"}, {n:"I Walk This Earth All By Myself", s:"music/earth.mp3"}, {n:"Owner Of A Lonley Heart", s:"music/heart.mp3"},
    {n:"Tempted", s:"music/tempt.mp3"}, {n:"Poison Arrow", s:"music/arrow.mp3"}, {n:"Is It A Crime", s:"music/crime.mp3"}, 
    {n:"Here We Are", s:"music/are.mp3"}, {n:"Through The Fire", s:"music/fire.mp3"}, {n:"Heart Of Mine", s:"music/mine.mp3"}, 
    {n:"Fly Away", s:"music/fly.mp3"}, {n:"Ain't Nobody", s:"music/nobody.mp3"}, {n:"Thinking Of You", s:"music/you.mp3"}, 
    {n:"Sweet Love", s:"music/love.mp3"}, {n:"I Still Remember You", s:"music/remember.mp3"}, {n:"Gamble With My Love", s:"music/gamble.mp3"}, 
    {n:"Sukiyaki", s:"music/suki.mp3"}
];

const drawer = document.getElementById('musicDrawer');
const bubble = document.getElementById('musicBubble');
const player = document.getElementById('musicPlayer');
const list = document.getElementById('songList');

songs.forEach(song => {
    const div = document.createElement('div');
    div.className = 'track';
    div.innerHTML = song.n;
    div.onclick = () => play(song.s, div);
    list.appendChild(div);
});

bubble.onclick = () => drawer.classList.toggle('active');
document.getElementById('volSlider').oninput = (e) => player.volume = e.target.value;
document.getElementById('shuffleBtn').onclick = () => {
    const r = Math.floor(Math.random()*songs.length);
    const trackEls = document.querySelectorAll('.track');
    play(songs[r].s, trackEls[r]);
};

function play(src, el) {
    const same = player.src.includes(src);
    document.querySelectorAll('.track').forEach(t => t.classList.remove('active-song'));
    if (same && !player.paused) { player.pause(); bubble.classList.remove('playing'); } 
    else {
        player.src = src; player.play(); el.classList.add('active-song'); bubble.classList.add('playing');
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}
</script>
</body>
</html>
