<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VI | Home</title>
<link rel="icon" href="gta/npc/lucia.jpg" type="image/jpg">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* ... your existing full styles here (navbar, modal, music, etc.) ... */

/* Make sure the countdown-wrap allows the new text to fit nicely */
.countdown-wrap {
  backdrop-filter: blur(1px);
  border-radius: 20px;
  padding: 32px 40px;          /* slightly more padding if needed */
  text-align: center;
  width: 88%;
  max-width: 680px;            /* a bit wider to match typical designs */
  margin-top: 120px;
  background: rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.4);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
.title { font-size: 38px; font-weight: 900; margin-bottom: 8px; }
.subtitle { font-size: 15px; margin: 8px 0 28px; opacity: 0.9; }
.clock {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.unit {
  min-width: 90px;
  padding: 16px 12px;
  border-radius: 16px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.2);
}
.num { font-size: 42px; font-weight: 900; line-height: 1; }
.label { font-size: 12px; opacity: 0.8; margin-top: 6px; text-transform: uppercase; }

/* ... rest of your styles ... */
</style>
</head>
<body>

<!-- your header, modal, etc. remain unchanged -->

<section class="countdown-wrap">
  <h1 class="title">Grand Theft Auto VI</h1>
  <div class="subtitle">RELEASE COUNTDOWN – NOVEMBER 19TH, 2026</div>
  
  <div class="clock">
    <div class="unit"><div class="num" id="days">000</div><div class="label">DAYS</div></div>
    <div class="unit"><div class="num" id="hours">00</div><div class="label">HOURS</div></div>
    <div class="unit"><div class="num" id="minutes">00</div><div class="label">MINUTES</div></div>
    <div class="unit"><div class="num" id="seconds">00</div><div class="label">SECONDS</div></div>
  </div>

  <!-- NEW TEXT ADDED HERE – exactly under the countdown units -->
  <p style="margin-top: 20px; font-size: 15px; font-weight: 500; opacity: 0.95; letter-spacing: 0.8px; color: #fff;">
    PRE-ORDER NOW TO UNLOCK EXCLUSIVE BONUS CONTENT
  </p>
</section>

<!-- music trigger, wheel, audio, scripts remain the same -->

<script>
// your existing countdown + music + modal scripts here (unchanged)
</script>
</body>
</html>
